                            c.toLowerCase() === code.toLowerCase();
                    });
                    return foundTpl ? (foundTpl['多零件模式'] || foundTpl.多零件模式 || '標準一對一') : '標準一對一';
                },

                getOwnTemplates(row) {
                    if (!row) return [];
                    const codesStr = String(row['樣板代碼'] || row['樣版代碼'] || row['TemplateCode'] || row['Code'] || '').trim();
                    if (!codesStr) {
                        return this.templates;
                    }
                    const codes = codesStr.split(',').map(s => s.trim()).filter(Boolean);
                    if (codes.length === 0) return this.templates;
                    const tailCode = codes[codes.length - 1];
                    const matched = this.templatesFull.filter(t => {
                        const name = String(t['樣板名稱'] || t['樣板定義'] || t['樣版名稱'] || t['Name'] || '').trim();
                        const c = String(t['樣板代碼'] || t['樣版代碼'] || t['代碼'] || t['Code'] || '').trim();
                        return c.toLowerCase() === tailCode.toLowerCase() || name.toLowerCase() === tailCode.toLowerCase();
                    });
                    const result = matched.map(t => String(t['樣板名稱'] || t['樣板定義'] || t['樣版名稱'] || t['Name'] || '').trim()).filter(Boolean);
                    const forms = String(this.drawerCheckForm || '').split(',').map(s => s.trim()).filter(Boolean);
                    forms.forEach(f => {
                        if (f && !result.includes(f)) {
                            result.push(f);
                        }
                    });
                    return result.length > 0 ? result : this.templates;
                },

                getParentCheckFromInheritance() {
                    if (!this.selectedDrawerRow) return '';
                    let bestMatch = '';
                    let targetRow = this.selectedDrawerRow;
                    if (targetRow['WBS']) {
                        const wbsParts = String(targetRow['WBS']).split('.');
                        wbsParts.pop();
                        const parentWbs = wbsParts.join('.');
                        if (parentWbs) {
                            let pRow = this.rows.find(r => r['WBS'] === parentWbs);
                            while (pRow) {
                                if (pRow['自檢表單'] && String(pRow['自檢表單']).trim() !== '') {
                                    bestMatch = String(pRow['自檢表單']).trim();
                                    break;
                                }
                                if (pRow['WBS'] && pRow['WBS'].includes('.')) {
                                    const parts = pRow['WBS'].split('.');
                                    parts.pop();
                                    const nextWbs = parts.join('.');
                                    pRow = this.rows.find(r => r['WBS'] === nextWbs);
                                } else {
                                    pRow = null;
                                }
                            }
                        }
                    }
                    if (!bestMatch) return '';
                    return bestMatch.split(',')[0].trim();
                },

                getFirstCheckForm() {
                    const parts = String(this.drawerCheckForm || '').split(',').map(s => s.trim()).filter(Boolean);
                    if (parts.length > 0) return parts[0];
                    return this.getParentCheckFromInheritance();
                },

                getAdditionalCheckForm() {
                    const parts = String(this.drawerCheckForm || '').split(',').map(s => s.trim()).filter(Boolean);
                    return parts.length > 1 ? parts[1] : '';
                },

                setAdditionalCheckForm(val) {
                    const firstPart = this.getFirstCheckForm();
                    if (val) {
                        this.drawerCheckForm = firstPart ? (firstPart + ',' + val) : val;
                    } else {
                        this.drawerCheckForm = firstPart;
                    }
                    this.saveDrawerContent();
                },

                getMultiModeForTask(taskId) {
                    const task = this.rows.find(t => t['任務ID'] === taskId);
                    if (!task) return '標準一對一';
                    const searchForm = String(task['自檢表單'] || task['自檢樣板代碼'] || '').trim();
                    if (!searchForm) return '標準一對一';

                    let foundTpl = this.templatesFull.find(t => {
                        const name = String(t['樣板名稱'] || t['樣板定義'] || t['樣版名稱'] || t['Name'] || '').trim();
                        const code = String(t['樣板代碼'] || t['樣版代碼'] || t['代碼'] || t['Code'] || '').trim();
                        return name === searchForm || code === searchForm ||
                            name.toLowerCase() === searchForm.toLowerCase() ||
                            code.toLowerCase() === searchForm.toLowerCase();
                    });

                    if (!foundTpl) {
                        foundTpl = this.templatesFull.find(t => {
                            const name = String(t['樣板名稱'] || t['樣板定義'] || t['樣版名稱'] || t['Name'] || '').trim();
                            const pureTpl = name.replace('自主檢查表', '').replace('檢查表', '').trim();
                            const pureForm = searchForm.replace('自主檢查表', '').replace('檢查表', '').trim();
                            return (pureTpl && pureForm && (pureTpl === pureForm || name.includes(pureForm) || pureForm.includes(pureTpl)));
                        });
                    }

                    return foundTpl ? (foundTpl['多零件模式'] || foundTpl.多零件模式 || '標準一對一') : '標準一對一';
                },

                getChecklistItemInstances(taskId, checklistId) {
                    const item = this.checklists.find(c => {
                        const cId = String(c['檢查ID'] || c['檢查Id'] || c['ID'] || c['Id'] || '');
                        return cId === String(checklistId);
                    });
                    if (this.getMultiModeForTemplate(item) !== '動態實例') {
                        return [];
                    }
                    const currentResults = this.results.filter(res => res.任務ID === taskId && res.檢查ID === checklistId && res.零件實例 !== undefined && res.零件實例 !== null && String(res.零件實例).trim() !== "");
                    return currentResults.map(res => ({
                        id: String(res.零件實例),
                        name: String(res.零件實例),
                        value: res.實際數值 || '',
                        result: res.判定結果 || '',
                        photoId: res.相片ID || ''
                    })).reverse();
                },

                addInstance(taskId, checklistId) {
                    const list = this.getChecklistItemInstances(taskId, checklistId);
                    const today = new Date();
                    const todayStr = today.getFullYear() +
                        String(today.getMonth() + 1).padStart(2, '0') +
                        String(today.getDate()).padStart(2, '0');

                    if (list.length === 0) {
                        const singleRes = this.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && (res.零件實例 === undefined || res.零件實例 === null || String(res.零件實例).trim() === ""));
                        if (singleRes && (singleRes.實際數值 || singleRes.相片ID)) {
                            singleRes.零件實例 = todayStr;
                            this.updateLocalCache();

                            this.api('renameComponent', {
                                taskId: taskId,
                                checklistId: checklistId,
                                oldId: '',
                                newId: todayStr
                            }).catch(err => console.error("Migration to backend failed:", err));
                            list.push({
                                id: todayStr,
                                name: todayStr,
                                value: singleRes.實際數值 || '',
                                result: singleRes.判定結果 || '',
                                photoId: singleRes.相片ID || ''
                            });
                        }
                    }

                    let nextId = "";
                    if (list.length > 0) {
                        const lastItem = list[list.length - 1];
                        const lastName = String(lastItem.name || lastItem.id || "");
                        const match = lastName.match(/^(.*?)(\d+)$/);
                        if (match) {
                            const prefix = match[1];
                            const textNum = match[2];
                            let nextVal = parseInt(textNum, 10) + 1;
                            let nextValStr = String(nextVal).padStart(textNum.length, '0');
                            let candidate = prefix + nextValStr;
                            while (list.some(i => String(i.name) === String(candidate) || String(i.id) === String(candidate)) ||
                                this.results.some(res => res.任務ID === taskId && res.檢查ID === checklistId && String(res.零件實例) === String(candidate))) {
                                nextVal++;
                                nextValStr = String(nextVal).padStart(textNum.length, '0');
                                candidate = prefix + nextValStr;
                            }
                            nextId = candidate;
                        }
                    }

                    if (!nextId) {
                        if (list.length === 0) {
                            let candidate = todayStr;
                            while (this.results.some(res => res.任務ID === taskId && res.檢查ID === checklistId && String(res.零件實例) === String(candidate))) {
                                let match = candidate.match(/^(.*?)(\d+)$/);
                                if (match) {
                                    const prefix = match[1];
                                    const numStr = match[2];
                                    let nextVal = parseInt(numStr, 10) + 1;
                                    let nextValStr = String(nextVal).padStart(numStr.length, '0');
                                    candidate = prefix + nextValStr;
                                } else {
                                    candidate = candidate + "_1";
                                }
                            }
                            nextId = candidate;
                        } else {
                            let nextNum = list.length + 1;
                            let candidate = "增設 " + nextNum;
                            while (list.some(i => String(i.name) === String(candidate) || String(i.id) === String(candidate)) ||
                                this.results.some(res => res.任務ID === taskId && res.檢查ID === checklistId && String(res.零件實例) === String(candidate))) {
                                nextNum++;
                                candidate = "增設 " + nextNum;
                            }
                            nextId = candidate;
                        }
                    }

                    let r = this.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && String(res.零件實例) === String(nextId));
                    if (!r) {
                        this.results.push({
                            任務ID: taskId,
                            檢查ID: checklistId,
                            零件實例: nextId,
                            實際數值: "",
                            判定結果: "",
                            相片ID: ""
                        });
                    }

                    this.updateLocalCache();

                    this.api('submitResult', { taskId, checklistId, value: '', result: '', componentId: nextId })
                        .catch(err => console.error("Syncing added instance to PM backend failed:", err));
                },


                async renameInstance(taskId, checklistId, oldId, newId) {
                    if (!newId) return;
                    newId = newId.trim();
                    if (newId === "" || newId === oldId) return;

                    const list = this.getChecklistItemInstances(taskId, checklistId);

                    if (list.some(i => i.id === newId)) {
                        this.showToast('零件名稱已存在', 'error');
                        return;
                    }

                    const oldRes = this.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && (res.零件實例 || "") === oldId);
                    if (!oldRes) return;

                    oldRes.零件實例 = newId;
                    this.updateLocalCache();

                    const saveKeyNew = taskId + '_' + checklistId + '_' + newId;
                    this.savingStates[saveKeyNew] = 'saving';

                    try {
                        const res = await this.api('renameComponent', {
                            taskId: taskId,
                            checklistId: checklistId,
                            oldId: oldId,
                            newId: newId
                        });

                        if (res && res.success) {
                            this.savingStates[saveKeyNew] = 'saved';
                            setTimeout(() => {
                                delete this.savingStates[saveKeyNew];
                            }, 2000);
                        } else {
                            throw new Error("API return false");
                        }
                    } catch (err) {
                        console.error("重命名零件失敗:", err);
                        oldRes.零件實例 = oldId;
                        this.updateLocalCache();
                        this.showToast('重命名零件失敗', 'error');
                    }
                },

                zoomPhoto(id, list = []) {
                    this.zoomPhotosList = list;
                    this.zoomPhotoIndex = list.indexOf(id);
                    this.photoZoomUrl = "https://drive.google.com/thumbnail?id=" + id + "&sz=w1200";
                },

                closeZoom() {
                    this.photoZoomUrl = null;
                    this.zoomPhotosList = [];
                    this.zoomPhotoIndex = -1;
                },

                navigateZoom(direction) {
                    if (!this.zoomPhotosList || this.zoomPhotosList.length <= 1) return;
                    if (direction === 'prev') {
                        this.zoomPhotoIndex = (this.zoomPhotoIndex - 1 + this.zoomPhotosList.length) % this.zoomPhotosList.length;
                    } else {
                        this.zoomPhotoIndex = (this.zoomPhotoIndex + 1) % this.zoomPhotosList.length;
                    }
                    const nextId = this.zoomPhotosList[this.zoomPhotoIndex];
                    this.photoZoomUrl = "https://drive.google.com/thumbnail?id=" + nextId + "&sz=w1200";
                },

                compressPhoto(file) {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = (e) => {
                            const img = new Image();
                            img.src = e.target.result;
                            img.onload = () => {
                                const canvas = document.createElement("canvas");
                                const MAX = 1200;
                                let w = img.width, h = img.height;
                                if (w > MAX) { h *= MAX / w; w = MAX; }
                                canvas.width = w; canvas.height = h;
                                canvas.getContext("2d").drawImage(img, 0, 0, w, h);
                                resolve(canvas.toDataURL("image/jpeg", 0.8));
                            };
                        };
                    });
                },

                // WBS階層多維度檢視切換
                setWbsLevel(lvl) {
                    if (lvl === 0 && this.wbsCycleMode === 0) {
                        lvl = 4; // 取消 L0 並顯現 ALL
                    }
                    this.wbsCycleMode = lvl;
                    if (lvl === 4 || lvl === 0) {
                        this.collapsedWbs = [];
                    } else {
                        this.collapsedWbs = this.rows
                            .filter(r => parseInt(r['階層'], 10) === lvl && this.hasWbsChildren(r))
                            .map(r => r['WBS'])
                            .filter(Boolean);
                    }
                    if (lvl === 0) {
                        this.showToast('已切換至 WBS L0 檢視 (僅顯有子項目的父任務)', 'info');
                    } else if (lvl === 4) {
                        this.showToast('已切換至 WBS All (全展開) 檢視', 'info');
                    } else {
                        this.showToast(`已切換至 WBS L${lvl} 檢視`, 'info');
                    }
                },

                // L1/L2/L3/All 輪動出現
                cycleMainWbs() {
                    let nextLvl = 1;
                    if (this.wbsCycleMode === 1) nextLvl = 2;
                    else if (this.wbsCycleMode === 2) nextLvl = 3;
                    else if (this.wbsCycleMode === 3) nextLvl = 4;
                    else nextLvl = 1;
                    this.setWbsLevel(nextLvl);
                },

                // 提交面板上的雙向更新
                async submitDrawerChanges(extraFields = {}) {
                    if (!this.oriDrawerRow) return;

                    const isDispatch = (extraFields['派工確認'] === true);
                    if (isDispatch) {
                        this.drawerSavingDispatch = true;
                    } else {
                        this.drawerSavingOnly = true;
                    }
                    this.drawerSaving = true;

                    const rowIndex = this.oriDrawerRow._rowIndex;

                    // 1. 整理需提交之後端欄位
                    const fields = {
                        '負責人': this.drawerAssignee,
                        '截止日期': this.drawerDueDate ? this.drawerDueDate.replace(/-/g, '/') : '',
                        '自檢表單': this.drawerCheckForm,
                        ...extraFields
                    };

                    // 2. 進行樂觀 UI 更新
                    const oldValueBackup = { ...this.oriDrawerRow };
                    for (const key in fields) {
                        this.oriDrawerRow[key] = fields[key];
                    }

                    // 確保沒有不小心清空 任務ID
                    if (!this.oriDrawerRow['任務ID'] || this.oriDrawerRow['任務ID'] === '－') {
                        this.oriDrawerRow['任務ID'] = '等待派工';
                    }

                    if (fields['派工確認'] === true) {
                        this.oriDrawerRow['派工確認'] = 'TRUE';
                    }
                    this.updateLocalCache(); // 快取保持一致
                    this.updateTabCounts();

                    try {
                        const res = await this.api('updatePmRow', {
                            sheetName: this.selectedSheetName,
                            rowIndex: rowIndex,
                            fields: fields
                        });

                        if (res && res.success) {
                            //this.showToast('資料變更成功已與雲端同步', 'success');
                            if (res.updatedRow) {
                                // 將後端真實生成的數值（例如：任務ID）合併回原陣列表物件
                                Object.assign(this.oriDrawerRow, res.updatedRow);
                                // 同步更新抽屜顯示
                                this.selectedDrawerRow = { ...this.oriDrawerRow };
                                // 強制觸發 getDispatchInfo 重新整理，確保狀態Badge立即更新
                                this.getDispatchInfo(this.oriDrawerRow);
                            }
                            this.updateLocalCache();
                        } else {
                            throw new Error('Server returned unsuccess');
                        }
                    } catch (e) {
                        console.error('[BISMS] 異動更寫失敗：', e);
                        // 寫入離線佇列
                        this.pendingChanges.push({
                            sheetName: this.selectedSheetName,
                            rowIndex: rowIndex,
                            fields: fields
                        });
                        this.savePendingChanges();
                        this.showToast('雲端提交失敗，已寫入離線快取同步佇列', 'warning');
                    } finally {
                        this.drawerSaving = false;
                        this.drawerSavingOnly = false;
                        this.drawerSavingDispatch = false;
                        if (extraFields['派工確認'] === true) {
                            this.drawerOpen = false; // 若為一鍵派工成功，直接關閉抽屜
                        }
                    }
                },

                // 各種過濾下取得 WBS 全項目個數
                getRowCountForFilter(filter) {
                    return this.tabCounts[filter] || 0;
                },

                // 有限分卷資料列
                get filteredRowsWithLimit() {
                    return this.filteredRows.slice(0, this.renderedLimit);
                },

                // 各類輔助美化
                getIndentPadding(level) {
                    const lvl = parseInt(level, 10) || 1;
                    if (lvl <= 1) return '0rem';
                    return `${(lvl - 1) * 1.5}rem`;
                },

                cleanTaskName(name) {
                    if (!name) return '';
                    return String(name).trim();
                },

                getLevelBadgeClass(level) {
                    const lvl = parseInt(level, 10) || 1;
                    if (lvl === 1) return 'bg-slate-800 text-slate-100 border border-slate-900';
                    if (lvl === 2) return 'bg-slate-100 text-slate-700 border border-slate-200';
                    if (lvl === 3) return 'bg-indigo-100 text-indigo-700 border border-indigo-200';
                    return 'bg-sky-100 text-sky-700 border border-sky-200';
                },

                getRowClass(row) {
                    const level = parseInt(row['階層'], 10) || 1;
                    const taskId = row['任務ID'];
                    const hasTaskId = taskId && taskId !== '等待派工' && taskId !== 'null' && taskId !== 'undefined' && String(taskId).trim() !== '';
                    const assignee = row['負責人'];

                    if (this.drawerOpen && this.selectedDrawerRow && this.selectedDrawerRow._rowIndex === row._rowIndex) {
                        return 'bg-indigo-50/70 border-l-4 border-indigo-600 transition-all font-semibold';
                    }
                    if (hasTaskId) {
                        return 'bg-emerald-50/20'; // 指派成功為淡綠色背景
                    }
                    if (this.isRowWaitingForDispatch(row)) {
                        return 'bg-amber-50/10'; // 等待派工為淡黃色背景
                    }
                    if (level === 3 && (!assignee || assignee === 'undefined' || String(assignee).trim() === '')) {
                        return 'bg-rose-50/25'; // 待指派之 L3 發紅粉色警告
                    }
                    return '';
                },

                // 計算折算派工進度百分比
                getProcessCompletion() {
                    const totalRows = this.computationRows.filter(r => {
                        const nextId = r['任務ID'];
                        const isDispatched = nextId && nextId !== '等待派工' && nextId !== 'null' && nextId !== 'undefined' && String(nextId).trim() !== '';
                        const isWaiting = this.isRowWaitingForDispatch(r);
                        return isDispatched || isWaiting;
                    });
                    if (totalRows.length === 0) return 0;
                    const dispatched = totalRows.filter(r => {
                        const id = r['任務ID'];
                        return id && id !== '等待派工' && id !== 'null' && id !== 'undefined' && String(id).trim() !== '';
                    }).length;
                    return Math.round((dispatched / totalRows.length) * 100);
                },

                getDispatchStats() {
                    const totalRows = this.computationRows.filter(r => {
                        const nextId = r['任務ID'];
                        const isDispatched = nextId && nextId !== '等待派工' && nextId !== 'null' && nextId !== 'undefined' && String(nextId).trim() !== '';
                        const isWaiting = this.isRowWaitingForDispatch(r);
                        return isDispatched || isWaiting;
                    });
                    if (totalRows.length === 0) return { total: 0, dispatched: 0, percent: 0 };
                    const dispatched = totalRows.filter(r => {
                        const id = r['任務ID'];
                        return id && id !== '等待派工' && id !== 'null' && id !== 'undefined' && String(id).trim() !== '';
                    }).length;
                    return {
                        total: totalRows.length,
                        dispatched: dispatched,
                        percent: Math.round((dispatched / totalRows.length) * 100)
                    };
                },

                getExecutionStats() {
                    const dispatched = this.computationRows.filter(r => {
                        const id = r['任務ID'];
                        return id && id !== '等待派工' && id !== 'null' && id !== 'undefined' && String(id).trim() !== '';
                    });
                    if (dispatched.length === 0) return { total: 0, completed: 0, percent: 0 };
                    const completed = dispatched.filter(r => {
                        const status = this.getDisplayProcessStatus(r);
                        return status === '處理完成' || status === '已完成';
                    }).length;
                    return {
                        total: dispatched.length,
                        completed: completed,
                        percent: Math.round((completed / dispatched.length) * 100)
                    };
                },

                getReportStats() {
                    const completed = this.computationRows.filter(r => {
                        const id = r['任務ID'];
                        const isDispatched = id && id !== '等待派工' && id !== 'null' && id !== 'undefined' && String(id).trim() !== '';
                        const status = this.getDisplayProcessStatus(r);
                        const isCompleted = status === '處理完成' || status === '已完成';
                        return isDispatched && isCompleted;
                    });
                    if (completed.length === 0) return { total: 0, withReport: 0, percent: 0 };
                    const withReport = completed.filter(r => this.hasReportLink(r)).length;
                    return {
                        total: completed.length,
                        withReport: withReport,
                        percent: Math.round((withReport / completed.length) * 100)
                    };
                },

                getClosureStats() {
                    const completed = this.computationRows.filter(r => {
                        const id = r['任務ID'];
                        const isDispatched = id && id !== '等待派工' && id !== 'null' && id !== 'undefined' && String(id).trim() !== '';
                        const status = this.getDisplayProcessStatus(r);
                        const isCompleted = status === '處理完成' || status === '已完成';
                        return isDispatched && isCompleted;
                    });
                    if (completed.length === 0) return { total: 0, closed: 0, percent: 0 };
                    const closed = completed.filter(r => this.hasCloseLink(r)).length;
                    return {
                        total: completed.length,
                        closed: closed,
                        percent: Math.round((closed / completed.length) * 100)
                    };
                },

                getParentBaseUrl() {
                    const webAppUrl = this.webAppUrl || "";
                    if (webAppUrl && (webAppUrl.toLowerCase().includes('/dev') || webAppUrl.toLowerCase().endsWith('dev'))) {
                        return "";
                    }
                    try {
                        const urlParams = new URLSearchParams(window.location.search);
                        const parentUrl = urlParams.get('parentUrl');
                        if (parentUrl) {
                            localStorage.setItem('bisms_parent_url', parentUrl);
                            return parentUrl;
                        }
                    } catch (e) { }
                    try {
                        if (typeof google !== 'undefined' && google.script && google.script.url) {
                            google.script.url.getLocation((location) => {
                                const parentUrl = location.parameter && location.parameter.parentUrl;
                                if (parentUrl) {
                                    localStorage.setItem('bisms_parent_url', parentUrl);
                                }
                            });
                        }
                    } catch (e) { }
                    return localStorage.getItem('bisms_parent_url') || "";
                },

                getTaskLink(taskId) {
                    if (!taskId) return '';
                    const foundRow = this.rows.find(r => r['任務ID'] === taskId);
                    if (foundRow && foundRow['結案日期'] && String(foundRow['結案日期']).trim() !== '' && foundRow['結案日期'] !== 'null' && foundRow['結案日期'] !== 'undefined') {
                        return '';
                    }
                    const parentUrl = this.getParentBaseUrl();
                    if (parentUrl) {
                        try {
                            const urlObj = new URL(parentUrl);
                            urlObj.searchParams.set('taskId', taskId);
                            urlObj.searchParams.delete('page');
                            return urlObj.toString();
                        } catch (e) {
                            return `${parentUrl}?taskId=${encodeURIComponent(taskId)}`;
                        }
                    }
                    if (this.webAppUrl) {
                        try {
                            const urlObj = new URL(this.webAppUrl);
                            urlObj.searchParams.set('taskId', taskId);
                            return urlObj.toString();
                        } catch (e) {
                            return `${this.webAppUrl}?taskId=${encodeURIComponent(taskId)}`;
                        }
                    }
                    return '';
                },

                getHomeLink() {
                    const parentUrl = this.getParentBaseUrl();
                    if (parentUrl) {
                        try {
                            const urlObj = new URL(parentUrl);
                            urlObj.searchParams.delete('page');
                            urlObj.searchParams.delete('taskId');
                            return urlObj.toString();
                        } catch (e) {
                            return parentUrl;
                        }
                    }
                    if (this.webAppUrl) {
                        try {
                            const urlObj = new URL(this.webAppUrl);
                            urlObj.searchParams.delete('page');
                            urlObj.searchParams.delete('taskId');
                            return urlObj.toString();
                        } catch (e) {
                            return this.webAppUrl;
                        }
                    }
                    return '#';
                },

                // 高級 WBS 組合過濾
                get filteredRows() {
                    let list = this.computationRows;

                    // 若設定為 L0，則僅篩選出父項目 (有下層子項目) 的任務
                    if (this.wbsCycleMode === 0) {
                        list = list.filter(r => this.hasWbsChildren(r));
                    }

                    // 若未搜尋且非 L0 模式，則啟用折疊隱藏
                    if (this.statusFilter === 'all' && !this.searchQuery && this.wbsCycleMode !== 0) {
                        list = list.filter(r => !this.isRowHidden(r));
                    }

                    if (this.statusFilter === 'ready_dispatch') {
                        list = list.filter(r => this.isRowWaitingForDispatch(r));
                    } else if (this.statusFilter === 'dispatched') {
                        list = list.filter(r => {
                            const taskId = r['任務ID'];
                            return taskId && taskId !== '等待派工' && taskId !== 'null' && taskId !== 'undefined' && String(taskId).trim() !== '';
                        });
                    } else if (this.statusFilter === 'not_completed') {
                        list = list.filter(r => {
                            const taskId = r['任務ID'];
                            const hasTaskId = taskId && taskId !== '等待派工' && taskId !== 'null' && taskId !== 'undefined' && String(taskId).trim() !== '';
                            if (!hasTaskId) return false;
                            const status = this.getDisplayProcessStatus(r);
                            return status !== '處理完成' && status !== '已完成';
                        });
                    } else if (this.statusFilter === 'completed') {
                        list = list.filter(r => {
                            const taskId = r['任務ID'];
                            const hasTaskId = taskId && taskId !== '等待派工' && taskId !== 'null' && taskId !== 'undefined' && String(taskId).trim() !== '';
                            if (!hasTaskId) return false;
                            const status = this.getDisplayProcessStatus(r);
                            return status === '處理完成' || status === '已完成';
                        });
                    } else if (this.statusFilter === 'overdue') {
                        list = list.filter(r => {
                            const taskId = r['任務ID'];
                            const hasTaskId = taskId && taskId !== '等待派工' && taskId !== 'null' && taskId !== 'undefined' && String(taskId).trim() !== '';
                            if (!hasTaskId) return false;
                            const status = this.getDisplayProcessStatus(r);
                            if (status === '處理完成' || status === '已完成') return false;
                            if (!r['截止日期'] || String(r['截止日期']).trim() === '' || String(r['截止日期']).trim() === 'null' || String(r['截止日期']).trim() === 'undefined') return false;
                            return this.isOverdue(r['截止日期']);
                        });
                    } else if (this.statusFilter === 'no_report') {
                        list = list.filter(r => {
                            const taskId = r['任務ID'];
                            const hasTaskId = taskId && taskId !== '等待派工' && taskId !== 'null' && taskId !== 'undefined' && String(taskId).trim() !== '';
                            if (!hasTaskId) return false;
                            const status = this.getDisplayProcessStatus(r);
                            if (status !== '處理完成' && status !== '已完成') return false;
                            return !this.hasReportLink(r);
                        });
                    } else if (this.statusFilter === 'with_report') {
                        list = list.filter(r => {
                            const taskId = r['任務ID'];
                            const hasTaskId = taskId && taskId !== '等待派工' && taskId !== 'null' && taskId !== 'undefined' && String(taskId).trim() !== '';
                            if (!hasTaskId) return false;
                            return this.hasReportLink(r);
                        });
                    } else if (this.statusFilter === 'no_close') {
                        list = list.filter(r => {
                            const taskId = r['任務ID'];
                            const hasTaskId = taskId && taskId !== '等待派工' && taskId !== 'null' && taskId !== 'undefined' && String(taskId).trim() !== '';
                            if (!hasTaskId) return false;
                            const status = this.getDisplayProcessStatus(r);
                            if (status !== '處理完成' && status !== '已完成') return false;
                            return !this.hasCloseLink(r);
                        });
                    } else if (this.statusFilter === 'closed') {
                        list = list.filter(r => {
                            const taskId = r['任務ID'];
                            const hasTaskId = taskId && taskId !== '等待派工' && taskId !== 'null' && taskId !== 'undefined' && String(taskId).trim() !== '';
                            if (!hasTaskId) return false;
                            return this.hasCloseLink(r);
                        });
                    }

                    return list;
                },

                // 樹狀收折控制核心函式
                toggleCollapse(wbs) {
                    if (!wbs) return;
                    if (this.collapsedWbs.includes(wbs)) {
                        this.collapsedWbs = this.collapsedWbs.filter(w => w !== wbs);
                    } else {
                        this.collapsedWbs.push(wbs);
                    }
                },

                isWbsCollapsed(wbs) {
                    if (!wbs) return false;
                    return this.collapsedWbs.includes(wbs);
                },

                isRowHidden(row) {
                    const wbs = row['WBS'];
                    if (!wbs) return false;
                    return this.collapsedWbs.some(parentWbs => {
                        return wbs !== parentWbs && (wbs.startsWith(parentWbs + '.') || wbs.startsWith(parentWbs + '-'));
                    });
                },

                hasWbsChildren(row) {
                    if (row._hasChildren !== undefined) {
                        return row._hasChildren;
                    }
                    const wbs = row['WBS'];
                    if (!wbs) return false;
                    const idx = this.rows.findIndex(r => r._rowIndex === row._rowIndex);
                    if (idx === -1 || idx === this.rows.length - 1) return false;

                    const nextRow = this.rows[idx + 1];
                    const nextWbs = nextRow['WBS'];
                    if (nextWbs && (nextWbs.startsWith(wbs + '.') || nextWbs.startsWith(wbs + '-'))) {
                        return true;
                    }
                    const nextLvl = parseInt(nextRow['階層'], 10) || 1;
                    const curLvl = parseInt(row['階層'], 10) || 1;
                    return nextLvl > curLvl;
                },

                cycleWbsCollapse() {
                    this.cycleMainWbs();
                },

                getLvlArray(level) {
                    const count = Math.max(0, (parseInt(level, 10) || 1) - 1);
                    return Array.from({ length: count }, (_, i) => i);
                },

                getWbsChildrenStats(row) {
                    const level = parseInt(row['階層'], 10) || 1;
                    const idx = row._index !== undefined ? row._index : this.rows.findIndex(r => r._rowIndex === row._rowIndex);
                    let immediateCount = 0;
                    let pending = 0;
                    let dispatched = 0;
                    let completed = 0;
                    let totalDispatchable = 0;

                    if (idx !== -1) {
                        for (let i = idx + 1; i < this.rows.length; i++) {
                            const nextRow = this.rows[i];
                            const nextLevel = parseInt(nextRow['階層'], 10) || 1;
                            if (nextLevel <= level) {
                                break;
                            }
                            if (nextLevel === level + 1) {
                                immediateCount++;
                            }
                            const nextId = nextRow['任務ID'];
                            const isDispatched = nextId && nextId !== '等待派工' && nextId !== 'null' && nextId !== 'undefined' && String(nextId).trim() !== '';
                            const isWaiting = this.isRowWaitingForDispatch(nextRow);
                            if (isDispatched || isWaiting) {
                                totalDispatchable++;
                                if (isWaiting) {
                                    pending++;
                                } else {
                                    const status = this.getDisplayProcessStatus(nextRow);
                                    if (status === '處理完成' || status === '已完成') {
                                        completed++;
                                    } else if (status !== '尚未開始' && status !== '未開始') {
                                        dispatched++;
                                    }
                                }
                            }
                        }
                    }
                    return {
                        hasChildren: immediateCount > 0 || totalDispatchable > 0,
                        immediateCount: immediateCount,
                        total: totalDispatchable,
                        pending: pending,
                        dispatched: dispatched,
                        completed: completed,
                        percent: totalDispatchable > 0 ? Math.round(((dispatched + completed) / totalDispatchable) * 100) : 0
                    };
                },

                // 判斷是否為等待派工
                isRowWaitingForDispatch(row) {
                    const level = parseInt(row['階層'], 10) || 1;
                    if (level < 2) return false;

                    // 不能有子項目 (葉子節點)
                    if (this.hasWbsChildren(row)) return false;

                    // 不能已經派工 (已經有真正的任務ID)
                    const taskId = row['任務ID'];
                    const isDispatched = taskId && taskId !== '等待派工' && taskId !== 'null' && taskId !== 'undefined' && String(taskId).trim() !== '';
                    if (isDispatched) return false;

                    return true;
                },

                hasReportLink(row) {
                    if (!row) return false;
                    const val = row['報告連結'];
                    if (val === null || val === undefined) return false;
                    const str = String(val).trim().toLowerCase();
                    return str !== '' && str !== 'null' && str !== 'undefined' && str !== '#n/a' && str !== '-' && str !== '－';
                },

                hasCloseLink(row) {
                    if (!row) return false;
                    const val = row['結案連結'];
                    if (val === null || val === undefined) return false;
                    const str = String(val).trim().toLowerCase();
                    return str !== '' && str !== 'null' && str !== 'undefined' && str !== '#n/a' && str !== '-' && str !== '－';
                },

                getDispatchInfo(row) {
                    const level = parseInt(row['階層'], 10) || 1;
                    const taskId = row['任務ID'];
                    const isDispatched = taskId && taskId !== '等待派工' && taskId !== 'null' && taskId !== 'undefined' && String(taskId).trim() !== '';
                    const isWaiting = this.isRowWaitingForDispatch(row);

                    // A. 所有具有子項目的節點 (父項目)：一律顯示進度統計說明
                    if (this.hasWbsChildren(row)) {
                        const stats = this.getWbsChildrenStats(row);
                        if (stats && stats.total > 0) {
                            return {
                                type: 'stats',
                                text: `${stats.dispatched} / ${stats.total} 已派工`,
                                badgeClass: 'bg-indigo-50 text-indigo-700 border border-indigo-200 px-2.5 py-1 rounded-xl text-xs font-semibold'
                            };
                        } else {
                            return {
                                type: 'stats',
                                text: '',
                                badgeClass: ''
                            };
                        }
                    }

                    // B. 子項目 (沒有子項目的底層工程)：顯示派工任務或等待派工
                    if (isDispatched) {
                        return {
                            type: 'taskId',
                            text: taskId,
                            badgeClass: level === 4
                                ? 'bg-blue-100 text-blue-800 border border-blue-200 px-2.5 py-0.5 rounded-full text-xs font-bold font-mono'
                                : 'bg-indigo-100 text-indigo-800 border border-indigo-200 px-2.5 py-0.5 rounded-full text-xs font-bold font-mono'
                        };
                    } else if (isWaiting) {
                        return {
                            type: 'pending',
                            text: '等待派工',
                            badgeClass: 'text-amber-600 bg-amber-50 border border-amber-100 px-2.5 py-1 rounded-xl text-xs font-bold animate-pulse'
                        };
                    } else {
                        return {
                            type: 'pending',
                            text: '－',
                            badgeClass: 'text-slate-300'
                        };
                    }
                },

                // API
                async api(action, payload) {
                    return new Promise((resolve) => {
                        if (typeof google !== 'undefined') {
                            const params = { ...(payload || {}), action };
                            google.script.run
                                .withSuccessHandler((res) => {
                                    if (res && res.success === false) {
                                        resolve(null);
                                    } else {
                                        resolve(res && res.data ? res.data : res);
                                    }
                                })
                                .withFailureHandler(() => {
                                    resolve(null);
                                })
                                .handleRoute(params);
                        } else {
                            resolve(null);
                        }
                    });
                }
            }
        }
    </script>
</body>
