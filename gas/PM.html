<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BISMS 專案管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Iansui&display=swap");

        html {
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'Iansui', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
        }

        .font-mono {
            font-family: 'JetBrains Mono', Fira Code, monospace;
        }

        [x-cloak] {
            display: none !important;
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Chrome, Safari, Edge, Opera - 隱藏 Webkit 核心瀏覽器的箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox - 隱藏 Gecko 核心瀏覽器的箭頭 */
        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        /* 針對 iPad / Tablet 顯著放大字體 */
        html {
            font-size: 18px;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        @media (min-width: 640px) {
            html {
                font-size: 20px !important;
                /* 顯著放大，從 16px 提升至 20px */
            }
        }

        /* 針對大螢幕微調間距 */
        .max-w-4xl {
            max-width: 1000px !important;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen py-3 px-3 sm:py-6 sm:px-6" x-data="pmDashboardApp()"
    x-init="init()">

    <!-- 頂部與摘要 -->
    <div class="max-w-7xl mx-auto space-y-4 mb-6">
        <header
            class="bg-white rounded-2xl p-4 sm:p-6 border border-slate-100 shadow-sm flex flex-col sm:flex-row sm:items-center sm:justify-start gap-4">
            <div>
                <a :href="getHomeLink()" target="_blank"
                    class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity">
                    <span class="text-2xl sm:text-3xl">📊</span>
                    <div>
                        <h1 class="text-xl sm:text-2xl font-bold text-slate-800 tracking-tight">專案管理系統</h1>
                    </div>
                </a>
            </div>

            <!-- 導覽列：選擇專案 -->
            <div class="flex flex-wrap items-center gap-2">
                <div class="relative min-w-[200px] w-full sm:w-auto">
                    <select x-model="selectedSheetName" @change="fetchPmData(selectedSheetName)"
                        class="w-full bg-slate-50 border border-slate-200 text-slate-800 font-semibold rounded-xl py-2 px-4 pr-10 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all appearance-none cursor-pointer text-sm">
                        <option value="" disabled>-- 選擇專案 --</option>
                        <template x-for="sheet in pmSheets" :key="sheet">
                            <option :value="sheet" x-text="sheet.replace('PM_', '')"
                                :selected="sheet === selectedSheetName"></option>
                        </template>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </div>
                </div>
            </div>
        </header>

        <!-- 數據分析卡 (Stats Block) -->
        <template x-if="!loading && rows.length > 0">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 animate-slide-up select-none">
                <!-- 1. 派工確認進度 -->
                <div @click="statusFilter = statusFilter === 'dispatched' ? 'all' : 'dispatched'; renderedLimit = 100;"
                    :class="statusFilter === 'dispatched' ? 'border-2 border-amber-500 ring-2 ring-amber-100 bg-amber-50/10 shadow-md' : 'border border-slate-100 hover:border-slate-300 hover:shadow bg-white'"
                    class="rounded-2xl p-4 flex flex-col justify-between transition-all duration-150 cursor-pointer">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-semibold text-slate-800">派工進度</span>
                        <span class="font-bold text-amber-600 font-mono"
                            x-text="`${getDispatchStats().percent}%`"></span>
                    </div>
                    <div class="text-xl sm:text-2xl font-bold text-amber-600 font-mono mt-1"
                        x-text="`${getDispatchStats().dispatched} / ${getDispatchStats().total}`"></div>
                    <div class="mt-2 flex items-center justify-between text-[11px]">
                        <span class="text-slate-400 font-medium">已派工 / 應派工</span>
                    </div>
                </div>
                <!-- 2. 施工完工率 -->
                <div @click="statusFilter = statusFilter === 'completed' ? 'all' : 'completed'; renderedLimit = 100;"
                    :class="statusFilter === 'completed' ? 'border-2 border-emerald-500 ring-2 ring-emerald-100 bg-emerald-50/10 shadow-md' : 'border border-slate-100 hover:border-slate-300 hover:shadow bg-white'"
                    class="rounded-2xl p-4 flex flex-col justify-between transition-all duration-150 cursor-pointer">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-semibold text-slate-800">現場進度</span>
                        <span class="font-bold text-emerald-600 font-mono"
                            x-text="`${getExecutionStats().percent}%`"></span>
                    </div>
                    <div class="text-xl sm:text-2xl font-bold text-emerald-600 font-mono mt-1"
                        x-text="`${getExecutionStats().completed} / ${getExecutionStats().total}`"></div>
                    <div class="mt-2 flex items-center justify-between text-[11px]">
                        <span class="text-slate-400 font-medium">已完工 / 已派工</span>
                    </div>
                </div>
                <!-- 3. 報告關聯率 -->
                <div @click="statusFilter = statusFilter === 'with_report' ? 'all' : 'with_report'; renderedLimit = 100;"
                    :class="statusFilter === 'with_report' ? 'border-2 border-blue-500 ring-2 ring-blue-100 bg-blue-50/10 shadow-md' : 'border border-slate-100 hover:border-slate-300 hover:shadow bg-white'"
                    class="rounded-2xl p-4 flex flex-col justify-between transition-all duration-150 cursor-pointer">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-semibold text-slate-500">報告產出</span>
                        <span class="font-bold text-blue-600 font-mono" x-text="`${getReportStats().percent}%`"></span>
                    </div>
                    <div class="text-xl sm:text-2xl font-bold text-blue-600 font-mono mt-1"
                        x-text="`${getReportStats().withReport} / ${getReportStats().total}`"></div>
                    <div class="mt-2 flex items-center justify-between text-[11px]">
                        <span class="text-slate-400 font-medium">已產出 / 已完工</span>
                    </div>
                </div>
                <!-- 4. 行政完工結案 -->
                <div @click="statusFilter = statusFilter === 'closed' ? 'all' : 'closed'; renderedLimit = 100;"
                    :class="statusFilter === 'closed' ? 'border-2 border-indigo-500 ring-2 ring-indigo-100 bg-indigo-50/10 shadow-md' : 'border border-slate-100 hover:border-slate-300 hover:shadow bg-white'"
                    class="rounded-2xl p-4 flex flex-col justify-between transition-all duration-150 cursor-pointer">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-semibold text-slate-500">結案歸檔</span>
                        <span class="font-bold text-indigo-600 font-mono"
                            x-text="`${getClosureStats().percent}%`"></span>
                    </div>
                    <div class="text-xl sm:text-2xl font-bold text-indigo-600 font-mono mt-1"
                        x-text="`${getClosureStats().closed} / ${getClosureStats().total}`"></div>
                    <div class="mt-2 flex items-center justify-between text-[11px]">
                        <span class="text-slate-400 font-medium">已歸檔 / 已完工</span>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <main class="max-w-7xl mx-auto space-y-6 mb-36 pb-20">

        <!-- 讀取狀態 -->
        <template x-if="loading">
            <div
                class="bg-white rounded-2xl shadow-sm p-12 border border-slate-100 flex flex-col items-center justify-center space-y-4">
                <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-500 border-t-transparent"></div>
                <p class="text-slate-400 text-sm font-medium">讀取表格結構與 WBS 排程中...</p>
            </div>
        </template>

        <template x-if="!loading && pmSheets.length === 0">
            <div class="bg-white rounded-2xl shadow-sm p-12 border border-slate-100 text-center">
                <span class="text-4xl text-slate-400">🔍</span>
                <h3 class="text-lg font-bold text-slate-700 mt-4">尚未偵測到任何專案進度表</h3>
                <p class="text-slate-500 text-sm mt-1">請確認 Google 試算表中已建立開頭為 "PM_" 的專案分頁。</p>
            </div>
        </template>

        <!-- 可視化工作區 -->
        <template x-if="!loading && pmSheets.length > 0 && selectedSheetName">
            <div class="space-y-6">

                <!-- 數據表格與 WBS 自主篩選 -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

                    <!-- 工具過濾欄 -->
                    <div
                        class="p-3.5 sm:p-5 border-b border-slate-100 bg-slate-50/50 flex flex-col lg:flex-row gap-4 items-stretch lg:items-center justify-between">


                        <!-- 狀態連鎖 Pills 列與控制項 -->
                        <div class="flex flex-col gap-3">
                            <!-- 第一排：搜尋與折疊控制 (自適應) -->
                            <div class="flex items-center gap-2">
                                <div class="relative flex-1">
                                    <span
                                        class="absolute inset-y-0 left-0 flex items-center pl-2.5 text-slate-400 pointer-events-none">
                                        <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                        </svg>
                                    </span>
                                    <input type="text" x-model="searchQuery"
                                        @input="renderedLimit = 100; updateTabCounts()" placeholder="搜尋..."
                                        class="w-full bg-white border border-slate-200 rounded-lg py-1.5 pl-8 pr-3 text-xs text-slate-800 focus:ring-2 focus:ring-indigo-500 transition-all">
                                </div>

                            </div>

                            <!-- 第二排：狀態過濾 Pills (強制單行橫向滾動，避免換行雜亂) -->
                            <div class="flex items-center gap-1.5 overflow-x-auto pb-1 scrollbar-none">
                                <button @click="statusFilter = 'all'; renderedLimit = 100;"
                                    :class="statusFilter === 'all' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 border border-slate-200'"
                                    class="px-2.5 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 whitespace-nowrap transition-all">
                                    全部<span :class="statusFilter === 'all' ? 'bg-indigo-700/80' : 'bg-slate-100'"
                                        class="px-1 rounded font-mono" x-text="getRowCountForFilter('all')"></span>
                                </button>
                                <button x-show="getRowCountForFilter('overdue')>0"
                                    @click="statusFilter = 'overdue'; renderedLimit = 100;"
                                    :class="statusFilter === 'overdue' ? 'bg-red-600 text-white' : 'bg-white text-slate-600 border border-slate-200'"
                                    class="px-2.5 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 whitespace-nowrap transition-all">
                                    已逾期<span
                                        :class="statusFilter === 'overdue' ? 'bg-red-700/80' : 'bg-red-50 text-red-600'"
                                        class="px-1 rounded font-mono" x-text="getRowCountForFilter('overdue')"></span>
                                </button>
                                <button x-show="getRowCountForFilter('ready_dispatch')>0"
                                    @click="statusFilter = 'ready_dispatch'; renderedLimit = 100;"
                                    :class="(statusFilter === 'ready_dispatch' || statusFilter === '待派工') ? 'bg-amber-600 text-white' : 'bg-white text-slate-600 border border-slate-200'"
                                    class="px-2.5 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 whitespace-nowrap transition-all">
                                    待派工<span
                                        :class="(statusFilter === 'ready_dispatch' || statusFilter === '待派工') ? 'bg-amber-700/80' : 'bg-amber-50 text-amber-600'"
                                        class="px-1 rounded font-mono"
                                        x-text="getRowCountForFilter('ready_dispatch')"></span>
                                </button>
                                <button x-show="getRowCountForFilter('dispatched')>0"
                                    @click="statusFilter = 'dispatched'; renderedLimit = 100;"
                                    :class="statusFilter === 'dispatched' ? 'bg-amber-600 text-white font-bold' : 'bg-white text-slate-600 border border-slate-200'"
                                    class="px-2.5 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 whitespace-nowrap transition-all">
                                    已派工<span
                                        :class="statusFilter === 'dispatched' ? 'bg-amber-700/80' : 'bg-amber-50 text-amber-600'"
                                        class="px-1 rounded font-mono"
                                        x-text="getRowCountForFilter('dispatched')"></span>
                                </button>
                                <button x-show="getRowCountForFilter('not_completed')>0"
                                    @click="statusFilter = 'not_completed'; renderedLimit = 100;"
                                    :class="statusFilter === 'not_completed' ? 'bg-blue-600 text-white' : 'bg-white text-slate-600 border border-slate-200'"
                                    class="px-2.5 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 whitespace-nowrap transition-all">
                                    未完工<span
                                        :class="statusFilter === 'not_completed' ? 'bg-blue-700/80' : 'bg-blue-50 text-blue-600'"
                                        class="px-1 rounded font-mono"
                                        x-text="getRowCountForFilter('not_completed')"></span>
                                </button>
                                <button x-show="getRowCountForFilter('completed')>0"
                                    @click="statusFilter = 'completed'; renderedLimit = 100;"
                                    :class="statusFilter === 'completed' ? 'bg-emerald-600 text-white font-bold' : 'bg-white text-slate-600 border border-slate-200'"
                                    class="px-2.5 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 whitespace-nowrap transition-all">
                                    已完工<span
                                        :class="statusFilter === 'completed' ? 'bg-emerald-700/80' : 'bg-emerald-50 text-emerald-600'"
                                        class="px-1 rounded font-mono"
                                        x-text="getRowCountForFilter('completed')"></span>
                                </button>

                                <button x-show="getRowCountForFilter('no_report')>0"
                                    @click="statusFilter = 'no_report'; renderedLimit = 100;"
                                    :class="statusFilter === 'no_report' ? 'bg-amber-600 text-white' : 'bg-white text-slate-600 border border-slate-200'"
                                    class="px-2.5 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 whitespace-nowrap transition-all">
                                    待審查<span
                                        :class="statusFilter === 'no_report' ? 'bg-amber-700/80' : 'bg-amber-50 text-amber-600'"
                                        class="px-1 rounded font-mono"
                                        x-text="getRowCountForFilter('no_report')"></span>
                                </button>
                                <button x-show="getRowCountForFilter('with_report')>0"
                                    @click="statusFilter = 'with_report'; renderedLimit = 100;"
                                    :class="statusFilter === 'with_report' ? 'bg-blue-600 text-white font-bold' : 'bg-white text-slate-600 border border-slate-200'"
                                    class="px-2.5 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 whitespace-nowrap transition-all">
                                    已產出<span
                                        :class="statusFilter === 'with_report' ? 'bg-blue-700/80' : 'bg-blue-50 text-blue-600'"
                                        class="px-1 rounded font-mono"
                                        x-text="getRowCountForFilter('with_report')"></span>
                                </button>
                                <button x-show="getRowCountForFilter('no_close')>0"
                                    @click="statusFilter = 'no_close'; renderedLimit = 100;"
                                    :class="statusFilter === 'no_close' ? 'bg-slate-600 text-white' : 'bg-white text-slate-600 border border-slate-200'"
                                    class="px-2.5 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 whitespace-nowrap transition-all">
                                    未結案<span
                                        :class="statusFilter === 'no_close' ? 'bg-slate-700/80' : 'bg-slate-50 text-slate-600'"
                                        class="px-1 rounded font-mono" x-text="getRowCountForFilter('no_close')"></span>
                                </button>
                                <button x-show="getRowCountForFilter('closed')>0"
                                    @click="statusFilter = 'closed'; renderedLimit = 100;"
                                    :class="statusFilter === 'closed' ? 'bg-indigo-600 text-white font-bold' : 'bg-white text-slate-600 border border-slate-200'"
                                    class="px-2.5 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 whitespace-nowrap transition-all">
                                    已歸檔<span :class="statusFilter === 'closed' ? 'bg-indigo-700/80' : 'bg-slate-100'"
                                        class="px-1 rounded font-mono" x-text="getRowCountForFilter('closed')"></span>
                                </button>
                            </div>
                        </div>

                    </div>

                    <!-- WBS 表格與進度 -->
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full min-w-full border-collapse text-left">
                            <thead>
                                <tr
                                    class="bg-slate-50 border-b border-slate-200 text-slate-500 font-semibold text-xs sm:text-sm uppercase tracking-wider">
                                    <th class="py-3 px-4 flex items-center justify-between w-full">
                                        <div class="flex items-center gap-2">
                                            <!-- 「多選/全選」控制（僅過濾出當前頁面所有可派工項目） -->
                                            <input type="checkbox" :checked="isAllWaitingSelected()"
                                                @change="toggleSelectAllWaiting()"
                                                class="h-4 w-4 bg-white border-slate-300 text-indigo-600 focus:ring-indigo-500 rounded transition-all cursor-pointer"
                                                title="選取/取消選取當前所有待派工項目">
                                            <span x-text="'專案：' + selectedSheetName.replace('PM_', '')"
                                                class="text-slate-900"></span>
                                        </div>

                                        <!-- WBS層級多維度可視化切換，頂部一鍵收摺/展開節點 -->
                                        <div class="flex items-center gap-1 bg-slate-100 p-0.5 rounded-lg">
                                            <button type="button" @click.stop="setWbsLevel(0)"
                                                :class="wbsCycleMode === 0 ? 'bg-indigo-600 text-white font-bold shadow-sm' : 'text-slate-600 hover:bg-slate-200'"
                                                class="px-2.5 py-1 text-[10px] rounded-md transition-all"
                                                title="篩選出父項目 (有下層子項目) 的任務">L0</button>
                                            <button type="button" @click.stop="cycleMainWbs()"
                                                :class="[1, 2, 3, 4].includes(wbsCycleMode) ? 'bg-indigo-600 text-white font-bold shadow-sm' : 'text-slate-600 hover:bg-slate-200'"
                                                class="px-3 py-1 text-[10px] rounded-md transition-all flex items-center gap-1"
                                                title="切換 WBS 檢視層級 (L1 / L2 / L3 / All)">
                                                <span
                                                    x-text="[1, 2, 3].includes(wbsCycleMode) ? 'L' + wbsCycleMode : 'All'"></span>
                                            </button>
                                        </div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 text-xs sm:text-sm">
                                <template x-for="row in filteredRowsWithLimit" :key="row._rowIndex">
                                    <tr @click="handleRowClick(row)" :class="getRowClass(row)"
                                        class="hover:bg-indigo-50/60 transition-colors duration-150 cursor-pointer">
                                        <!-- 任務項目名稱 -->
                                        <td class="p-0 h-[1.5px] relative align-stretch">
                                            <div class="flex items-stretch h-full">
                                                <!-- 樹狀指示聯結線 (原生伸展、無斷線、無對位落差) -->
                                                <div class="flex select-none shrink-0"
                                                    x-show="parseInt(row['階層'], 10) > 1">
                                                    <!-- 靠左維持基準間距 -->
                                                    <div class="w-2 sm:w-4 h-full shrink-0"></div>

                                                    <template x-for="(lvlIdx, idx) in getLvlArray(row['階層'])"
                                                        :key="idx">
                                                        <div @click.stop="toggleCollapse(row['WBS'])"
                                                            class="w-2 sm:w-6 h-full flex justify-center relative shrink-0">
                                                            <!-- 垂直指示引導虛線 -->
                                                            <div
                                                                class="absolute inset-y-0 w-px border-r border-dashed border-slate-300">
                                                            </div>
                                                            <!-- L型分支橫接橫條 (完美無縫延伸至右側) -->
                                                            <template x-if="idx === (parseInt(row['階層'], 10) || 1) - 2">
                                                                <div
                                                                    class="absolute left-1/2 right-0 top-1/4 h-px bg-slate-300">
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>

                                                <!-- 實際任務內容 -->
                                                <div class="flex-1 flex flex-col justify-center gap-1 py-3 pr-4"
                                                    :class="parseInt(row['階層'], 10) === 1 ? 'pl-4' : 'pl-2'">
                                                    <!-- 第一列：WBS 與 任務名稱 -->
                                                    <div class="flex items-start gap-2 mb-0.5">
                                                        <!-- 展開與折疊 Chevron 按鈕 / 葉子節點對齊佔位符 / 葉子待派工多選框 -->
                                                        <div
                                                            class="w-4 sm:w-5 h-5 flex items-center justify-center shrink-0 mt-0.5">
                                                            <template x-if="hasWbsChildren(row)">
                                                                <button @click.stop="toggleCollapse(row['WBS'])"
                                                                    class="p-0.5 bg-slate-100 hover:bg-indigo-100 text-slate-500 hover:text-indigo-700 rounded transition-colors focus:outline-none flex items-center justify-center shrink-0"
                                                                    title="點選切換折疊">
                                                                    <svg class="h-3.5 w-3.5 transform transition-transform duration-150"
                                                                        :class="isWbsCollapsed(row['WBS']) ? '-rotate-90' : ''"
                                                                        fill="none" stroke="currentColor"
                                                                        stroke-width="2.5" viewBox="0 0 24 24">
                                                                        <path stroke-linecap="round"
                                                                            stroke-linejoin="round"
                                                                            d="M19 9l-7 7-7-7" />

    <!-- Zoom Modal -->
    <div x-show="photoZoomUrl" x-data="{
        startY: 0,
        startX: 0,
        diffY: 0,
        diffX: 0,
        isSwiping: false,
        handleTouchStart(e) {
            if (e.touches.length !== 1) return;
            this.startY = e.touches[0].screenY;
            this.startX = e.touches[0].screenX;
            this.diffY = 0;
            this.diffX = 0;
            this.isSwiping = true;
        },
        handleTouchMove(e) {
            if (!this.isSwiping || e.touches.length !== 1) return;
            this.diffY = e.touches[0].screenY - this.startY;
            this.diffX = e.touches[0].screenX - this.startX;
        },
        handleTouchEnd() {
            if (!this.isSwiping) return;
            this.isSwiping = false;
            
            // 1. Swipe down threshold (80px) to close image zoom
            if (this.diffY > 80 && Math.abs(this.diffY) > Math.abs(this.diffX)) {
                this.closeZoom();
            } 
            // 2. Swipe left / right threshold (60px) to navigate images
            else if (Math.abs(this.diffX) > 60 && Math.abs(this.diffX) > Math.abs(this.diffY)) {
                if (this.diffX < 0) {
                    this.navigateZoom('next');
                } else {
                    this.navigateZoom('prev');
                }
            }
            
            this.diffY = 0;
            this.diffX = 0;
        }
    }" @touchstart="handleTouchStart($event)" @touchmove="handleTouchMove($event)" @touchend="handleTouchEnd()"
        class="fixed inset-0 z-[100] bg-slate-950/95 backdrop-blur-md flex flex-col items-center justify-between p-4 select-none touch-none"
        @click="closeZoom()" x-cloak>

        <!-- Top Status Info Bar -->

                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" class="w-5 h-5">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <!-- Main Viewport containing Image and Side controls -->
        <div class="relative flex-1 w-full flex items-center justify-center z-0" @click.stop>
            <!-- Left side click trigger -->
            <button x-show="zoomPhotosList.length > 1" @click="navigateZoom('prev')"
                class="hidden sm:flex absolute left-4 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 transition-all text-white items-center justify-center border border-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" class="w-5 h-5">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>

            <!-- Zoomed Image Container -->
            <div class="max-w-full max-h-[80vh] flex items-center justify-center overflow-hidden pointer-events-none transition-transform duration-200"
                :style="'transform: translate3d(' + diffX + 'px, ' + diffY + 'px, 0)'">
                <img :src="photoZoomUrl" referrerpolicy="no-referrer"
                    class="max-w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border border-white/10 select-none" />
            </div>

            <!-- Right side click trigger -->
            <button x-show="zoomPhotosList.length > 1" @click="navigateZoom('next')"
                class="hidden sm:flex absolute right-4 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 transition-all text-white items-center justify-center border border-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" class="w-5 h-5">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>

        <!-- Bottom Instructions Tip -->
        <div class="text-[11px] font-black tracking-wide text-slate-400 py-2 select-none pointer-events-none z-10 text-center"
            @click.stop>
            💡 可向左右滑動切換照片，或向下拖曳關閉預覽
        </div>
    </div>

    <script>
        function pmDashboardApp() {
            return {
                loading: true,
                pmSheets: [],
                staff: [],
                selectedSheetName: '',
                headers: [],
                rows: [],
                searchQuery: '',
                statusFilter: 'all',
                toasts: [],
                webAppUrl: '',
                collapsedWbs: [], // 紀錄被收折 of WBS 代碼
                wbsCycleMode: 4, // 預設 L4 收折 (僅顯 L1~L4項目)
                tabCounts: {
                    all: 0,
                    ready_dispatch: 0,
                    not_completed: 0,
                    overdue: 0,
                    no_report: 0,
                    no_close: 0,
                    dispatched: 0,
                    completed: 0,
                    with_report: 0,
                    closed: 0
                },

                isOverdue(dateStr) {
                    if (!dateStr || String(dateStr).trim() === '' || dateStr === 'null' || dateStr === 'undefined') return false;
                    const dStr = String(dateStr).replace(/-/g, '/');
                    const d = new Date(dStr);
                    if (isNaN(d.getTime())) return false;
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    return d.getTime() < today.getTime();
                },

                formatDisplayDate(dateStr) {
                    if (!dateStr || String(dateStr).trim() === '' || dateStr === 'null' || dateStr === 'undefined') return '';
                    if (this.isOverdue(dateStr)) {
                        return `逾期:${dateStr}`;
                    }
                    return `📅${dateStr}`;
                },

                getParentTask(wbs) {
                    if (!wbs || typeof wbs !== 'string' || !wbs.includes('.')) return null;
                    const parts = wbs.split('.');
                    parts.pop();
                    const parentWbs = parts.join('.');
                    return this.rows.find(r => r['WBS'] === parentWbs);
                },

                getTaskBreadcrumb(wbs) {
                    if (!wbs || typeof wbs !== 'string') return [];
                    const parts = wbs.split('.');
                    const breadcrumb = [];
                    while (parts.length > 1) {
                        parts.pop();
                        const pWbs = parts.join('.');
                        const parent = this.rows.find(r => r['WBS'] === pWbs);
                        if (parent) {
                            breadcrumb.unshift(parent['任務名稱']);
                        }
                    }
                    return breadcrumb.join(' > ');
                },

                // 新增特徵與速寫狀態
                cacheTime: '',
                syncing: false,
                renderedLimit: 100,

                // Quick Action Drawer
                drawerOpen: false,
                selectedDrawerRow: null,
                oriDrawerRow: null,
                drawerAssignee: '',
                drawerDueDate: '',
                drawerTaskName: '',
                drawerDispatchConfirm: false,
                drawerSaving: false,
                drawerSavingOnly: false,
                drawerSavingDispatch: false,
                drawerCheckForm: '',
                templates: [],
                templatesFull: [],
                checklists: [],
                results: [],
                saveTimeouts: {},
                savingStates: {},
                uploadingPhotos: {},
                currentUploadTaskId: '',
                currentUploadChecklistId: '',
                currentUploadComponentId: '',
                instanceMap: {},
                deletingPhotos: [],
                zoomPhotosList: [],
                zoomPhotoIndex: -1,
                photoZoomUrl: null,

                // 批次指派與雙向版本鎖
                selectedRowIndices: [],
                batchAssignee: '',
                batchDueDate: '',
                batchCheckForm: '',
                batchSaving: false,
                batchVersion: 0,
                pendingChanges: [],

                get computationRows() {
                    let list = this.rows;
                    if (this.searchQuery && this.searchQuery.trim() !== '') {
                        const q = this.searchQuery.trim().toLowerCase();
                        list = list.filter(r => {
                            const nameMatch = r['任務名稱'] && r['任務名稱'].toLowerCase().includes(q);
                            const wbsMatch = r['WBS'] && r['WBS'].toLowerCase().includes(q);
                            const staffMatch = r['負責人'] && r['負責人'].toLowerCase().includes(q);
                            return nameMatch || wbsMatch || staffMatch;
                        });
                    }
                    return list;
                },

                getDisplayProcessStatus(row) {
                    const pStatus = row['執行進度'];
                    const rStatus = row['報告狀態'];
                    const hasPStatus = pStatus && String(pStatus).trim() !== '' && pStatus !== 'undefined' && pStatus !== 'null';

                    if (hasPStatus) {
                        return pStatus;
                    }

                    // 如果執行進度被清空，但報告狀態屬於已完成的階段，則給予適當的狀態顯示
                    const FINISHED_STATUSES = ["已提報結果", "已提交結果", "已審查結果", "已生成報告", "已發布報告", "已結案"];
                    if (FINISHED_STATUSES.includes(rStatus)) {
                        return '處理完成';
                    }

                    return '尚未開始';
                },

                getDisplayProcessClass(row) {
                    const status = this.getDisplayProcessStatus(row);
                    if (status === '持續進行') return 'bg-blue-600 text-white border-blue-700';
                    if (status === '處理完成' || status === '已處理' || status === '已完成') return 'bg-emerald-600 text-white border-emerald-700';
                    if (status === '等待回覆') return 'bg-amber-500 text-white border-amber-600';
                    if (status === '暫緩處理') return 'bg-purple-600 text-white border-purple-700';
                    return 'bg-slate-200 text-slate-900 border-slate-400';
                },

                updateTabCounts() {
                    const counts = {
                        all: 0,
                        ready_dispatch: 0,
                        not_completed: 0,
                        overdue: 0,
                        no_report: 0,
                        no_close: 0,
                        dispatched: 0,
                        completed: 0,
                        with_report: 0,
                        closed: 0
                    };
                    const sourceRows = this.computationRows;
                    counts.all = sourceRows.length;

                    sourceRows.forEach(r => {
                        const taskId = r['任務ID'];
                        const hasTaskId = taskId && taskId !== '等待派工' && taskId !== 'null' && taskId !== 'undefined' && String(taskId).trim() !== '';
                        const status = this.getDisplayProcessStatus(r);
                        const isCompleted = status === '處理完成' || status === '已完成';
                        const isWaiting = this.isRowWaitingForDispatch(r);

                        // 1. ready_dispatch (待派工)
                        if (isWaiting) {
                            counts.ready_dispatch++;
                        }

                        // 2. dispatched (已派工)
                        if (hasTaskId) {
                            counts.dispatched++;
                        }

                        // 3. not_completed (未完工)
                        if (hasTaskId && !isCompleted) {
                            counts.not_completed++;
                        }

                        // 4. completed (已完工)
                        if (hasTaskId && isCompleted) {
                            counts.completed++;
                        }

                        // 5. overdue (已逾期)
                        if (hasTaskId && !isCompleted) {
                            if (r['截止日期'] && String(r['截止日期']).trim() !== '' && String(r['截止日期']).trim() !== 'null' && String(r['截止日期']).trim() !== 'undefined') {
                                if (this.isOverdue(r['截止日期'])) {
                                    counts.overdue++;
                                }
                            }
                        }

                        // 6. no_report (待審查 / 未產出)
                        if (hasTaskId && isCompleted && !this.hasReportLink(r)) {
                            counts.no_report++;
                        }

                        // 7. with_report (已產出)
                        if (hasTaskId && this.hasReportLink(r)) {
                            counts.with_report++;
                        }

                        // 8. no_close (未結案)
                        if (hasTaskId && isCompleted && !this.hasCloseLink(r)) {
                            counts.no_close++;
                        }

                        // 9. closed (已結案)
                        if (hasTaskId && this.hasCloseLink(r)) {
                            counts.closed++;
                        }
                    });
                    this.tabCounts = counts;
                },

                // 批次選擇與指派核心方法
                isAllWaitingSelected() {
                    const list = this.filteredRows.filter(r => this.isRowWaitingForDispatch(r));
                    if (list.length === 0) return false;
                    return list.every(r => this.selectedRowIndices.includes(r._rowIndex));
                },

                toggleSelectAllWaiting() {
                    const list = this.filteredRows.filter(r => this.isRowWaitingForDispatch(r));
                    if (this.isAllWaitingSelected()) {
                        const indicesToKeep = this.selectedRowIndices.filter(idx => !list.some(r => r._rowIndex === idx));
                        this.selectedRowIndices = indicesToKeep;
                    } else {
                        const newIndices = [...this.selectedRowIndices];
                        list.forEach(r => {
                            if (!newIndices.includes(r._rowIndex)) {
                                newIndices.push(r._rowIndex);
                            }
                        });
                        this.selectedRowIndices = newIndices;
                    }
                },

                autoFillBatchCheckForm() {
                    let bestMatch = '';
                    if (this.selectedRowIndices.length > 0) {
                        const firstSelectedRowIndex = this.selectedRowIndices[0];
                        let targetRow = this.rows.find(r => r._rowIndex === firstSelectedRowIndex);

                        while (targetRow) {
                            if (targetRow['自檢表單'] && String(targetRow['自檢表單']).trim() !== '') {
                                bestMatch = String(targetRow['自檢表單']).trim();
                                break;
                            }

                            if (targetRow['WBS']) {
                                const wbsParts = String(targetRow['WBS']).split('.');
                                wbsParts.pop();
                                const parentWbs = wbsParts.join('.');
                                if (parentWbs) {
                                    targetRow = this.rows.find(r => r['WBS'] === parentWbs);
                                } else {
                                    targetRow = null;
                                }
                            } else {
                                targetRow = null;
                            }
                        }
                    }

                    if (bestMatch) {
                        this.batchCheckForm = bestMatch;
                        this.showToast(`批次帶入繼承表單: ${this.batchCheckForm}`, 'success');
                    } else {
                        this.batchCheckForm = '';
                        this.showToast('無法自動找到繼承表單，請手動指定', 'warning');
                    }
                },

                async submitBatchDispatch() {
                    if (this.selectedRowIndices.length === 0 || this.batchSaving) return;
                    this.batchSaving = true;

                    this.batchVersion += 1;
                    const currentVersion = this.batchVersion;

                    const indicesToUpdate = [...this.selectedRowIndices];
                    const assignee = this.batchAssignee;
                    const dueDate = this.batchDueDate ? this.batchDueDate.replace(/-/g, '/') : '';
                    const checkForm = this.batchCheckForm;

                    // 樂觀更新
                    indicesToUpdate.forEach(idx => {
                        const row = this.rows.find(r => r._rowIndex === idx);
                        if (row) {
                            row['負責人'] = assignee;
                            row['截止日期'] = dueDate;
                            row['自檢表單'] = checkForm;
                            row['派工確認'] = 'TRUE';
                        }
                    });
                    this.updateLocalCache();
                    this.updateTabCounts();

                    this.showToast(`啟動 ${indicesToUpdate.length} 筆工單批次指派同步中...`, 'info');

                    const updates = indicesToUpdate.map(idx => ({
                        rowIndex: idx,
                        fields: {
                            '負責人': assignee,
                            '截止日期': dueDate,
                            '自檢表單': checkForm,
                            '派工確認': true
                        }
                    }));

                    try {
                        const res = await this.api('batchUpdatePmRows', {
                            sheetName: this.selectedSheetName,
                            updates: updates
                        });

                        if (currentVersion < this.batchVersion) {
                            console.log(`[BISMS] 忽略舊版非同步批次 API 回傳`);
                            return;
                        }

                        if (res && res.success) {
                            if (res.updatedRows && Array.isArray(res.updatedRows)) {
                                res.updatedRows.forEach(updatedRow => {
                                    const row = this.rows.find(r => r._rowIndex === updatedRow._rowIndex);
                                    if (row) {
                                        Object.assign(row, updatedRow);
                                    }
                                });
                            }
                            this.showToast(`批次指派成功，共 ${indicesToUpdate.length} 筆完成雲端同步`, 'success');
                            this.selectedRowIndices = [];
                        } else {
                            updates.forEach(upd => {
                                this.pendingChanges.push({
                                    sheetName: this.selectedSheetName,
                                    rowIndex: upd.rowIndex,
                                    fields: upd.fields
                                });
                            });
                            this.savePendingChanges();
                            this.showToast('雲端提交失敗，已寫入離線快取同步佇列', 'warning');
                            this.selectedRowIndices = [];
                        }
                    } catch (err) {
                        console.error('[BISMS] 批次提交發生非預期錯誤：', err);
                        if (currentVersion === this.batchVersion) {
                            updates.forEach(upd => {
                                this.pendingChanges.push({
                                    sheetName: this.selectedSheetName,
                                    rowIndex: upd.rowIndex,
                                    fields: upd.fields
                                });
                            });
                            this.savePendingChanges();
                            this.showToast('批次指派遭遇錯誤，已自動轉存為離線佇列', 'error');
                            this.selectedRowIndices = [];
                        }
                    } finally {
                        if (currentVersion === this.batchVersion) {
                            this.batchSaving = false;
                            this.updateLocalCache();
                            this.updateTabCounts();
                        }
                    }
                },

                // 離線待同步佇列
                loadPendingChanges() {
                    const saved = localStorage.getItem('bisms_pending_pm_changes');
                    if (saved) {
                        try {
                            this.pendingChanges = JSON.parse(saved) || [];
                        } catch (e) {
                            this.pendingChanges = [];
                        }
                    }
                },

                savePendingChanges() {
                    localStorage.setItem('bisms_pending_pm_changes', JSON.stringify(this.pendingChanges));
                },

                async syncPendingChanges() {
                    if (this.pendingChanges.length === 0 || this.syncing) return;
                    console.log(`[BISMS] 開始靜默同步離線變更項目 (共 ${this.pendingChanges.length} 筆)`);
                    const queue = [...this.pendingChanges];
                    this.pendingChanges = [];
                    this.savePendingChanges();

                    for (const change of queue) {
                        try {
                            const res = await this.api('updatePmRow', {
                                sheetName: change.sheetName,
                                rowIndex: change.rowIndex,
                                fields: change.fields
                            });
                            if (res && res.success) {
                                console.log(`[BISMS] 離線同步完成: Row ${change.rowIndex}`);
                            } else {
                                this.pendingChanges.push(change);
                            }
                        } catch (err) {
                            console.error('[BISMS] 背景靜默同步失敗：', err);
                            this.pendingChanges.push(change);
                        }
                    }
                    this.savePendingChanges();
                },

                async init() {
                    this.loadPendingChanges();
                    // 1. 優先嘗試載入本地離線快取
                    const cachedDefaultStr = localStorage.getItem('bisms_pm_cache_default');
                    if (cachedDefaultStr) {
                        try {
                            const cached = JSON.parse(cachedDefaultStr);
                            this.pmSheets = cached.pmSheets || [];
                            this.staff = cached.staff || [];
                            this.templates = cached.templates || [];
                            this.templatesFull = cached.templatesFull || [];
                            this.checklists = cached.checklists || [];
                            this.results = cached.results || [];
                            this.selectedSheetName = cached.selectedSheetName || '';
                            this.headers = cached.headers || [];
                            this.rows = cached.rows || [];
                            this.decorateRows();
                            this.webAppUrl = cached.webAppUrl || '';
                            this.cacheTime = cached.cacheTime || '';
                            this.updateTabCounts();

                            // 預設折疊第三層
                            this.collapsedWbs = this.rows
                                .filter(r => parseInt(r['階層'], 10) === 3 && this.hasWbsChildren(r))
                                .map(r => r['WBS'])
                                .filter(Boolean);

                            // 標記為快取載入成功，解除白屏
                            this.loading = false;
                            this.syncing = true;
                        } catch (e) {
                            console.error('[BISMS] 離線快取載入失敗，將進入同步取得：', e);
                        }
                    }

                    // 2. 背景靜默刷新（Lazy Sync / Hydration）
                    await this.fetchPmData(this.selectedSheetName, false);
                },

                // 下拉與初始化（支援強制重拉與背景靜默同步模式）
                async fetchPmData(sheetName = '', forceLoader = true) {
                    if (forceLoader || this.rows.length === 0) {
                        this.loading = true;
                    }
                    this.syncing = true;
                    try {
                        const res = await this.api('getPmInitData', { sheetName });
                        if (res) {
                            this.pmSheets = res.pmSheets || [];
                            this.staff = res.staff || [];
                            this.templates = res.templates || [];
                            this.templatesFull = res.templatesFull || [];
                            this.checklists = res.checklists || [];
                            this.results = res.results || [];
                            this.selectedSheetName = res.selectedSheetName || (this.pmSheets.length > 0 ? this.pmSheets[0] : '');
                            this.headers = res.headers || [];
                            this.rows = res.rows || [];
                            this.decorateRows();
                            this.webAppUrl = res.webAppUrl || '';

                            // 取得刷新時間
                            const t = new Date();
                            const formattedTime = t.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                            this.cacheTime = formattedTime;

                            // 更新並持久化至快取
                            this.updateLocalCache();
                            this.updateTabCounts();

                            // 預設將具有第四層子項目的第三層 WBS 進行收折 (折疊)
                            if (this.collapsedWbs.length === 0) {
                                this.collapsedWbs = this.rows
                                    .filter(r => parseInt(r['階層'], 10) === 3 && this.hasWbsChildren(r))
                                    .map(r => r['WBS'])
                                    .filter(Boolean);
                            }

                            // 嘗試同步離線寫入
                            await this.syncPendingChanges();
                        }
                    } catch (e) {
                        console.error('[BISMS] 背景同步失敗：', e);
                        this.showToast('雲端連線不穩定，系統自動繼承離線閱讀模式', 'warning');
                    } finally {
                        this.loading = false;
                        this.syncing = false;
                    }
                },

                // 口袋工具：快取持久化
                updateLocalCache() {
                    const cacheData = {
                        pmSheets: this.pmSheets,
                        staff: this.staff,
                        templates: this.templates,
                        templatesFull: this.templatesFull,
                        checklists: this.checklists,
                        results: this.results,
                        selectedSheetName: this.selectedSheetName,
                        headers: this.headers,
                        rows: this.rows,
                        webAppUrl: this.webAppUrl,
                        cacheTime: this.cacheTime
                    };
                    const cacheKey = 'bisms_pm_cache_' + this.selectedSheetName;
                    localStorage.setItem(cacheKey, JSON.stringify(cacheData));
                    localStorage.setItem('bisms_pm_cache_default', JSON.stringify(cacheData));
                },

                // 批次與大清查效能優化 (預先標記 hasWbsChildren)
                decorateRows() {
                    if (!this.rows || this.rows.length === 0) return;
                    const len = this.rows.length;
                    for (let i = 0; i < len; i++) {
                        const row = this.rows[i];
                        row._index = i;

                        const wbs = row['WBS'];
                        let hasChildren = false;
                        if (wbs && i < len - 1) {
                            const nextRow = this.rows[i + 1];
                            const nextWbs = nextRow['WBS'];
                            if (nextWbs && (nextWbs.startsWith(wbs + '.') || nextWbs.startsWith(wbs + '-'))) {
                                hasChildren = true;
                            } else {
                                const nextLvl = parseInt(nextRow['階層'], 10) || 1;
                                const curLvl = parseInt(row['階層'], 10) || 1;
                                hasChildren = nextLvl > curLvl;
                            }
                        }
                        row._hasChildren = hasChildren;
                    }
                },

                // 全域提示
                showToast(message, type = 'info') {
                    const id = Date.now() + Math.random();
                    this.toasts.push({ id, message, type });
                    setTimeout(() => {
                        this.toasts = this.toasts.filter(t => t.id !== id);
                    }, 4000);
                },

                // 點擊事件：一律打開雙向變更速寫面板
                handleRowClick(row) {
                    this.openQuickActionDrawer(row);
                },

                // 獨立開啟雙向變更速寫面板
                openQuickActionDrawer(row) {
                    this.selectedDrawerRow = { ...row }; // 複製品，提供抽屜顯示與草稿不影響主視格
                    this.oriDrawerRow = row; // 記錄原始參考，以便更新成功時直接回寫
                    this.instanceMap = {}; // 重置多零件實例對應，防止跨任務交叉干涉

                    // 負責人預設邏輯
                    let currentAssignee = '';
                    if (row['負責人'] && String(row['負責人']).trim() !== '' && String(row['負責人']).trim() !== 'null' && String(row['負責人']).trim() !== 'undefined') {
                        currentAssignee = String(row['負責人']).trim();
                    }

                    if (currentAssignee) {
                        this.drawerAssignee = currentAssignee;
                    } else {
                        this.drawerAssignee = '';
                        this.inheritParentAssignee(true); // 靜默嘗試
                    }

                    // 自檢表單
                    this.drawerCheckForm = row['自檢表單'] && String(row['自檢表單']).trim() !== '' ? String(row['自檢表單']).trim() : '';
                    if (!this.drawerCheckForm) {
                        this.autoFillDefaultCheckForm(true); // 靜默嘗試
                    }

                    // 標準化日期
                    if (row['截止日期']) {
                        let dStr = String(row['截止日期']).trim();
                        if (dStr.includes('/')) {
                            dStr = dStr.replace(/\//g, '-');
                        }
                        this.drawerDueDate = dStr;
                    } else {
                        this.drawerDueDate = '';
                    }

                    this.drawerOpen = true;
                },

                // 向上承襲母階負責人
                inheritParentAssignee(silent = false) {
                    if (!this.selectedDrawerRow) return;
                    const wbs = this.selectedDrawerRow['WBS'];
                    if (!wbs || !wbs.includes('.')) return;
                    const parts = wbs.split('.');
                    parts.pop();
                    const parentWbs = parts.join('.');
                    const parentRow = this.rows.find(r => r['WBS'] === parentWbs);
                    if (parentRow && parentRow['負責人'] && String(parentRow['負責人']).trim() !== '') {
                        this.drawerAssignee = String(parentRow['負責人']).trim();
                        if (!silent) {
                            this.showToast(`已成功承襲 L3 負責人: ${this.drawerAssignee}`, 'success');
                        }
                    } else {
                        if (!silent) {
                            this.showToast('母階亦無指定負責人！', 'warning');
                        }
                    }
                },

                // 自動分配自檢樣板表單
                autoFillDefaultCheckForm(silent = false) {
                    if (!this.selectedDrawerRow) return;
                    let bestMatch = '';
                    let targetRow = this.selectedDrawerRow;

                    while (targetRow) {
                        if (targetRow['自檢表單'] && String(targetRow['自檢表單']).trim() !== '') {
                            bestMatch = String(targetRow['自檢表單']).trim();
                            break;
                        }

                        if (targetRow['WBS']) {
                            const wbsParts = String(targetRow['WBS']).split('.');
                            wbsParts.pop();
                            const parentWbs = wbsParts.join('.');
                            if (parentWbs) {
                                targetRow = this.rows.find(r => r['WBS'] === parentWbs);
                            } else {
                                targetRow = null;
                            }
                        } else {
                            targetRow = null;
                        }
                    }

                    if (bestMatch) {
                        this.drawerCheckForm = bestMatch;
                        if (!silent) {
                            this.showToast(`已載入繼承表單: ${this.drawerCheckForm}`, 'success');
                        }
                    } else {
                        if (!silent) {
                            this.showToast('無法自動找到繼承表單，請手動指定', 'warning');
                        }
                    }
                },

                getChecklistsForDrawer() {
                    const searchFormStr = String(this.drawerCheckForm || '').trim();
                    if (!searchFormStr) return [];

                    const searchForms = searchFormStr.split(',').map(s => s.trim()).filter(Boolean);
                    const allMatchedChecklists = [];
                    const addedCheckIds = new Set();

                    searchForms.forEach(searchForm => {
                        // [超強防禦防呆比對]：搜尋設定_樣板定義
                        let foundTpl = this.templatesFull.find(t => {
                            const name = String(t['樣板名稱'] || t['樣板定義'] || t['樣版名稱'] || t['Name'] || '').trim();
                            const code = String(t['樣板代碼'] || t['樣版代碼'] || t['代碼'] || t['Code'] || '').trim();
                            return name === searchForm || code === searchForm ||
                                name.toLowerCase() === searchForm.toLowerCase() ||
                                code.toLowerCase() === searchForm.toLowerCase();
                        });

                        // 2. 次要模糊比對 (防呆：剔除「自主檢查表」與常見字眼後比對，或子字串關係)
                        if (!foundTpl) {
                            foundTpl = this.templatesFull.find(t => {
                                const name = String(t['樣板名稱'] || t['樣板定義'] || t['樣版名稱'] || t['Name'] || '').trim();
                                const pureTpl = name.replace('自主檢查表', '').replace('檢查表', '').trim();
                                const pureForm = searchForm.replace('自主檢查表', '').replace('檢查表', '').trim();
                                return (pureTpl && pureForm && (pureTpl === pureForm || name.includes(pureForm) || pureForm.includes(pureTpl)));
                            });
                        }

                        // 取得最合理的樣板代碼、樣板名稱
                        let tplCode = '';
                        let tplName = '';
                        if (foundTpl) {
                            tplCode = String(foundTpl['樣板代碼'] || foundTpl['樣版代碼'] || foundTpl['代碼'] || foundTpl['Code'] || '').trim();
                            tplName = String(foundTpl['樣板名稱'] || foundTpl['樣板定義'] || foundTpl['樣版名稱'] || foundTpl['Name'] || '').trim();
                        }

                        // 3. 在 checklists 中進行極寬鬆的過濾與匹配
                        this.checklists.forEach(c => {
                            const cCode = String(c['樣板代碼'] || c['樣版代碼'] || c['樣板定義'] || c['TemplateCode'] || c['Code'] || '').trim();
                            const cName = String(c['樣板名稱'] || c['樣版名稱'] || c['Name'] || '').trim();
                            const cTaskName = String(c['任務名稱'] || c['檢查項目'] || '').trim();
                            const cId = String(c['檢查ID'] || c['檢查Id'] || c['ID'] || c['Id'] || '');

                            let isMatch = false;
                            if (tplCode && cCode === tplCode) isMatch = true;
                            else if (tplName && (cCode === tplName || cName === tplName)) isMatch = true;
                            else if (cCode === searchForm || cName === searchForm || cTaskName.includes(searchForm)) isMatch = true;
                            else {
                                const pureForm = searchForm.replace('自主檢查表', '').replace('檢查表', '').trim();
                                const pureCCode = cCode.replace('自主檢查表', '').replace('檢查表', '').trim();
                                if (pureForm && pureCCode && (pureCCode === pureForm || cCode.includes(pureForm) || pureForm.includes(pureCCode))) isMatch = true;
                            }

                            if (isMatch && !addedCheckIds.has(cId)) {
                                addedCheckIds.add(cId);
                                allMatchedChecklists.push(c);
                            }
                        });
                    });

                    return allMatchedChecklists;
                },

                getResult(taskId, checklistId, componentId = "") {
                    if (!taskId || !checklistId) return { 實際數值: "", 判定結果: "", 相片ID: "", 零件實例: "" };
                    const comp = componentId || "";
                    let r = this.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && String(res.零件實例 ?? "") === comp);
                    if (!r) {
                        r = { 任務ID: taskId, 檢查ID: checklistId, 實際數值: "", 判定結果: "", 相片ID: "", 零件實例: comp };
                        this.results.push(r);
                    }
                    return r;
                },

                calculateAutoJudgment(item, value) {
                    if (value === undefined || value === null || String(value).trim() === "") return "";
                    if (item.邏輯型態 === "數值") {
                        const num = parseFloat(value);
                        if (isNaN(num)) return "";

                        const minVal = parseFloat(item.最小值 || item.下限);
                        const maxVal = parseFloat(item.最大值 || item.上限);
                        const hasMin = !isNaN(minVal) && item.最小值 !== "";
                        const hasMax = !isNaN(maxVal) && item.最大值 !== "";

                        if (hasMin && hasMax) {
                            return (num >= minVal && num <= maxVal) ? "合格" : "不合格";
                        } else if (hasMin) {
                            return (num >= minVal) ? "合格" : "不合格";
                        } else if (hasMax) {
                            return (num <= maxVal) ? "合格" : "不合格";
                        }

                        const std = item.判定標準 || "";
                        const rangeMatch = std.match(/([+-]?\d*\.?\d+)\s*[~-]\s*([+-]?\d*\.?\d+)/);
                        if (rangeMatch) {
                            const rMin = parseFloat(rangeMatch[1]);
                            const rMax = parseFloat(rangeMatch[2]);
                            return (num >= rMin && num <= rMax) ? "合格" : "不合格";
                        }

                        const gteMatch = std.match(/>=\s*([+-]?\d*\.?\d+)/);
                        if (gteMatch) {
                            const rGte = parseFloat(gteMatch[1]);
                            return (num >= rGte) ? "合格" : "不合格";
                        }

                        const lteMatch = std.match(/<=\s*([+-]?\d*\.?\d+)/);
                        if (lteMatch) {
                            const rLte = parseFloat(lteMatch[1]);
                            return (num <= rLte) ? "合格" : "不合格";
                        }
                        return "";
                    }
                    return "";
                },

                requiresPhoto(item) {
                    const req = item['需附照片'];
                    return ['TRUE', '是', 'V', 'v', '1', 1, true, 'true'].includes(req);
                },

                async saveItemResult(taskId, checklistId, value, componentId = "") {
                    const task = this.rows.find(text => text.任務ID === taskId);
                    if (!task) return;
                    const item = this.getChecklistsForDrawer().find(c => c.檢查ID === checklistId);

                    const compId = componentId || "";
                    const key = compId ? taskId + '_' + checklistId + '_' + compId : taskId + '_' + checklistId;

                    if (!this.saveTimeouts[key]) {
                        const r = this.getResult(taskId, checklistId, compId);
                        this.saveTimeouts[key] = {
                            oldActualValue: r ? r.實際數值 : "",
                            oldResult: r ? r.判定結果 : "",
                            oldStatus: task['報告狀態'] || '',
                            oldProcessStatus: task['執行進度'] || '',
                            timer: null,
                            version: 0
                        };
                    }

                    this.saveTimeouts[key].version += 1;
                    const currentVersion = this.saveTimeouts[key].version;

                    this.savingStates[key] = 'saving';

                    const r = this.getResult(taskId, checklistId, compId);
                    r.實際數值 = value;
                    const autoJudge = item ? this.calculateAutoJudgment(item, value) : "";
                    r.判定結果 = autoJudge;

                    if (task['報告狀態'] === "" || task['報告狀態'] === "未開始" || task['報告狀態'] === "退回修改" || !task['報告狀態']) {
                        task['報告狀態'] = "執行中";
                        task['執行進度'] = "持續進行";
                    }
                    this.updateLocalCache();

                    if (this.saveTimeouts[key].timer) {
                        clearTimeout(this.saveTimeouts[key].timer);
                    }

                    this.saveTimeouts[key].timer = setTimeout(async () => {
                        const res = await this.api('submitResult', { taskId, checklistId, value, result: autoJudge, componentId: compId });

                        const currentTimeout = this.saveTimeouts[key];
                        if (!currentTimeout) return;

                        if (currentVersion < currentTimeout.version) {
                            console.log(`[BISMS] 忽略舊版非同步 API 回傳 (${currentVersion} < 最新版 ${currentTimeout.version})`);
                            return;
                        }

                        if (res) {
                            this.savingStates[key] = 'saved';
                            if (res.result) r.判定結果 = res.result;
                            if (res.newTaskStatus) task['報告狀態'] = res.newTaskStatus;
                            if (res.newProcessStatus) task['執行進度'] = res.newProcessStatus;
                            delete this.saveTimeouts[key];
                            this.updateLocalCache();
                        } else {
                            r.實際數值 = currentTimeout.oldActualValue;
                            r.判定結果 = currentTimeout.oldResult;
                            task['報告狀態'] = currentTimeout.oldStatus;
                            task['執行進度'] = currentTimeout.oldProcessStatus;
                            this.showToast('資料儲存失敗，已自動還原', 'error');
                            this.savingStates[key] = '';
                            delete this.saveTimeouts[key];
                            this.updateLocalCache();
                        }
                    }, 800);
                },

                triggerUpload(taskId, checklistId, componentId = "") {
                    this.currentUploadTaskId = taskId;
                    this.currentUploadChecklistId = checklistId;
                    this.currentUploadComponentId = componentId || "";
                    document.getElementById('drawer-photo-upload').click();
                },

                async handlePhotoUpload(event) {
                    const taskId = this.currentUploadTaskId;
                    const task = this.rows.find(t => t.任務ID === taskId);
                    if (!task) return;
                    const files = Array.from(event.target.files);
                    if (!files.length || !this.currentUploadChecklistId) return;

                    const checklistId = this.currentUploadChecklistId;
                    const compId = this.currentUploadComponentId || "";
                    const checklistItem = this.checklists.find(c => c.檢查ID === checklistId) || {};
                    const key = compId ? taskId + "_" + checklistId + "_" + compId : taskId + "_" + checklistId;

                    if (!this.uploadingPhotos[key]) this.uploadingPhotos[key] = [];

                    const newUploads = files.map((file, i) => {
                        const objUrl = URL.createObjectURL(file);
                        return {
                            id: 'tmp_' + Date.now() + '_' + i,
                            status: '上傳中',
                            base64: objUrl,
                            objectUrl: objUrl,
                            file: file
                        };
                    });

                    this.uploadingPhotos[key].push(...newUploads);
                    event.target.value = "";

                    (async () => {
                        try {
                            for (const up of newUploads) {
                                up.base64 = await this.compressPhoto(up.file);
                                up.status = "上傳中";

                                const res = await this.api('submitResult', {
                                    taskId,
                                    checklistId,
                                    base64Photo: up.base64,
                                    taskName: task['任務名稱'] || task['項目名稱'] || '',
                                    templateName: this.drawerCheckForm || '',
                                    taskCategory: '',
                                    subItemName: '',
                                    checkItemTag: checklistItem.報告標籤 || '',
                                    componentId: compId
                                });

                                if (res && res.photoId) {
                                    this.uploadingPhotos[key] = this.uploadingPhotos[key].filter(u => u.id !== up.id);

                                    let r = this.getResult(taskId, checklistId, compId);
                                    r.相片ID = res.photoId;
                                    if (res.result) r.判定結果 = res.result;
                                    if (res.newTaskStatus) task['報告狀態'] = res.newTaskStatus;
                                    if (res.newProcessStatus) task['執行進度'] = res.newProcessStatus;
                                    //this.showToast('照片上傳成功', 'success');
                                    this.updateLocalCache();
                                } else {
                                    up.status = '失敗';
                                }
                            }
                        } catch (e) {
                            console.error(e);
                            this.showToast('照片處理發生異常', 'error');
                        } finally {
                            newUploads.forEach(u => {
                                if (u.objectUrl) URL.revokeObjectURL(u.objectUrl);
                            });
                        }
                    })();
                },

                async deletePhoto(taskId, checklistId, photoId, componentId = "") {
                    const task = this.rows.find(t => t.任務ID === taskId);
                    if (!task) return;

                    if (this.deletingPhotos.includes(photoId)) return;
                    this.deletingPhotos.push(photoId);

                    const compId = componentId || "";

                    try {
                        const res = await this.api('deletePhoto', {
                            taskId: taskId,
                            checklistId: checklistId,
                            photoIdToDelete: photoId,
                            componentId: compId
                        });

                        if (res) {
                            let r = this.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && String(res.零件實例 ?? "") === compId);
                            if (r) {
                                const currentIds = (r.相片ID || "").split(",").map(s => s.trim()).filter(Boolean);
                                const nextIds = currentIds.filter(id => id !== photoId);
                                r.相片ID = nextIds.join(",");

                                const checklistItem = this.checklists.find(c => c.檢查ID === checklistId) || {};
                                if (checklistItem.邏輯型態 === '相片') {
                                    r.實際數值 = r.相片ID;
                                    if (nextIds.length === 0) {
                                        r.判定結果 = "";
                                    }
                                }
                            }
                            //this.showToast('照片刪除成功', 'success');
                            this.updateLocalCache();
                        } else {
                            this.showToast('刪除失敗，請重新整理', 'error');
                        }
                    } catch (e) {
                        console.error("Delete failed:", e);
                        this.showToast('連線異常', 'error');
                    } finally {
                        this.deletingPhotos = this.deletingPhotos.filter(id => id !== photoId);
                    }
                },

                getMultiModeForTemplate(item) {
                    if (!item) return '標準一對一';
                    const code = String(item['樣板代碼'] || item['樣版代碼'] || item['樣板定義'] || item['TemplateCode'] || item['Code'] || '').trim();
                    if (!code) return '標準一對一';
                    const foundTpl = this.templatesFull.find(t => {
                        const name = String(t['樣板名稱'] || t['樣板定義'] || t['樣版名稱'] || t['Name'] || '').trim();
                        const c = String(t['樣板代碼'] || t['樣版代碼'] || t['代碼'] || t['Code'] || '').trim();
                        return name === code || c === code ||
                            name.toLowerCase() === code.toLowerCase() ||
