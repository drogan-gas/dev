<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏭 BISMS 現場管理系統</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Iansui&display=swap");

    html {
      scrollbar-gutter: stable;
    }

    body {
      font-family:
        "Iansui",
        "Noto Sans TC",
        system-ui,
        -apple-system,
        sans-serif;
      line-height: 1.6;
    }

    [x-cloak] {
      display: none !important;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .animate-slide-up {
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(10px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .shadow-soft {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
    }

    /* Chrome, Safari, Edge, Opera - 隱藏 Webkit 核心瀏覽器的箭頭 */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Firefox - 隱藏 Gecko 核心瀏覽器的箭頭 */
    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    /* 針對 iPad / Tablet 顯著放大字體 */
    html {
      font-size: 16px;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
    }

    @media (min-width: 640px) {
      html {
        font-size: 18px !important;
        /* 顯著放大，從 16px 提升至 18px */
      }
    }

    /* 針對大螢幕微調間距 */
    .max-w-4xl {
      max-width: 1000px !important;
    }
  </style>

  <script>
    /**
     * 🚀 BISMS 前端 Alpine.js 風格與樂觀 UI 規範 (Optimistic UI Guidelines)
     * -------------------------------------------------------------
     * 為了保持極致流暢的使用者體驗與資料一致性，所有前端交互與 API 呼叫必須遵循以下四部曲：
     * 
     * 1. 快取優先 (Cache-First)：
     *    首頁/切換時優先讀取本地 localStorage ('bisms_init_data') 進行秒速渲染，避免白屏等待；
     *    隨後在背景異步獲取最新資料並靜默更新 UI 與快取。
     * 
     * 2. 樂觀渲染 (Optimistic UI)：
     *    任何資料寫入（如：輸入檢查項目、建立任務、照片刪除/上傳佔位）都不應等待後端 API 回應。
     *    應立即更新本地的 data 陣列及 UI 狀態，讓使用者感到「零延遲」。
     * 
     * 3. 減震傳送 (Debounce Transmission)：
     *    針對頻繁觸發的輸入欄位（如：數值或文字輸入），必須實作 800ms 的 Debounce。
     *    當使用者停止輸入達 800ms 時，才發送一次 api 請求，避免洗板與伺服器過載。
     * 
     * 4. 離線與失敗還原 (Offline & Failure Rollback)：
     *    網路斷線 (navigator.onLine === false) 或 API 請求失敗時，必須立刻彈出 Toast 提示，
     *    並將受影響的資料與 UI 還原 (Rollback) 至備份的舊值，保證前後端一致。
     * -------------------------------------------------------------
     */

    const FINISHED_STATUSES = ["已提報結果", "已審查結果", "已生成報告", "已結案"];

    const TAB_RULE_REGISTRY = {
      admin: {
        "待審工單": (s, cat, sub) => ["已提報結果", "已提交結果"].includes(s) && !sub.includes("追蹤案件"),
        "工程管理": (s, cat, sub) => cat.includes("工程管理") && s !== "已結案",
        "待歸檔": (s, cat, sub) => ["已審查結果", "已生成報告"].includes(s) && !sub.includes("追蹤案件")
      },
      user: {
        "待辦工單": (s, cat, sub) => ["未開始", "執行中", "退回修改"].includes(s) && !cat.includes("工程管理") && !sub.includes("追蹤案件"),
        "工程管理": (s, cat, sub) => ["未開始", "執行中", "退回修改", "已提報結果"].includes(s) && cat.includes("工程管理"),
        "近期完成": (s, cat, sub) => FINISHED_STATUSES.includes(s) && !sub.includes("追蹤案件")
      }
    };

    document.addEventListener('alpine:init', () => {
      Alpine.data('app', () => ({
        loading: true,
        syncing: false,
        isOffline: !navigator.onLine,
        view: 'task-list',
        statusFilter: '待辦工單',
        selectedStaff: localStorage.getItem('lastSelectedStaff') || '全部',
        selectedTemplate: '全部',
        searchQuery: '',
        activeTask: null,
        activeChecklists: [],
        uploadingPhotos: {},
        currentUploadComponentId: '',
        deletingPhotos: [], // 追蹤正在刪除的照片 ID
        quickTaskModalOpen: false,
        qtTemplateCode: '',
        qtName: '',
        qtAssignee: '',
        qtParentTaskId: '',
        isFollowUpMode: false,
        qtFilterCategory: null,
        qtInheritTask: null,
        photoZoomUrl: null,
        zoomPhotosList: [],
        zoomPhotoIndex: -1,
        toasts: [],
        data: { tasks: [], staff: [], projects: [], checklists: [], results: [] },
        isAdminMode: false,
        passcodeModalOpen: false,
        passcodeInput: '',
        rejectModalOpen: false,
        rejectReasonInput: '',
        rejectingTaskId: '',
        saveTimeouts: {},
        savingStates: {},
        instanceMap: {},

        init() {
          this.fetchInitialData();
          window.addEventListener('online', () => { this.isOffline = false; this.showToast('已恢復網路連線', 'success'); });
          window.addEventListener('offline', () => { this.isOffline = true; this.showToast('目前處於離線狀態', 'error'); });
          this.$watch('statusFilter', () => { this.selectedTemplate = '全部'; this.searchQuery = ''; });
          this.$watch('selectedStaff', () => { this.selectedTemplate = '全部'; this.searchQuery = ''; });
          this.$watch('selectedTemplate', () => { this.searchQuery = ''; });
        },

        sanitizeTasks() {
          if (!this.data || !this.data.tasks) return;
          let changed = false;
          this.data.tasks.forEach(t => {
            if (!t.報告狀態) {
              t.報告狀態 = "未開始";
              changed = true;
              this.api("updateTaskFields", {
                taskId: t.任務ID,
                fields: { 報告狀態: "未開始" }
              });
            }
          });
          if (changed) {
            this.updateLocalCache();
          }
        },

        // 新建追蹤案件 → 用 Quick Task Modal 取代（預設工單異常處理樣板，繼承父任務資訊）
        showFollowUpModal(parentTaskId) {
          const parentTask = this.data.tasks.find(t => t.任務ID === parentTaskId);
          if (!parentTask) return;
          // 找到「工單異常處理」樣板
          const followUpTpl = this.data.templates?.find(t => t.樣板名稱 === '工單異常處理');
          this.showQuickTaskModal({
            templateCode: followUpTpl?.樣板代碼 || '',
            name: parentTask.任務名稱 ? (parentTask.任務名稱 + '_' + (parentTask.樣板名稱 || '').replace('自主檢查表', '')) : '',
            assignee: parentTask.負責人 || '',
            parentTaskId,
            inheritTask: parentTask,
          });
        },


        showQuickTaskModal(opts = {}) {
          this.isFollowUpMode = !!opts.parentTaskId;
          this.qtParentTaskId = opts.parentTaskId || '';
          this.qtInheritTask = opts.inheritTask || null;
          this.qtFilterCategory = opts.filterCategory || null;
          this.qtTemplateCode = opts.templateCode || '';
          this.qtName = opts.name || '';
          this.qtAssignee = opts.assignee || '';
          if (opts.templateCode) this.handleQtTemplateChange(opts.templateCode, true);
          this.quickTaskModalOpen = true;
        },

        handleQtTemplateChange(code, skipOverride = false) {
          if (!code) {
            if (!skipOverride) { this.qtName = ''; this.qtAssignee = ''; }
            return;
          }
          const template = this.data.templates.find(t => t.樣板代碼 === code);
          if (template && !skipOverride) {
            this.qtAssignee = template.負責人 || '';
          }
        },

        async submitQuickTask() {
          if (!this.qtTemplateCode || !this.qtName || !this.qtAssignee) {
            console.log('submitQuickTask', this.qtTemplateCode, this.qtName, this.qtAssignee);
            this.showToast('請填寫所有欄位 (*)', 'error');
            return;
          }

          this.syncing = true;

          const template = this.data.templates.find(t => t.樣板代碼 === this.qtTemplateCode);
          if (!template) {
            this.showToast('找不到該樣板資訊', 'error');
            this.syncing = false;
            return;
          }

          const today = new Date();
          const todayStr = `${today.getFullYear()}/${String(today.getMonth() + 1).padStart(2, '0')}/${String(today.getDate()).padStart(2, '0')}`;

          let dueDateStr = '';
          const duration = parseInt(template.工期, 10);
          if (!isNaN(duration) && duration > 0) {
            const dueDate = new Date();
            dueDate.setDate(today.getDate() + duration - 1);
            dueDateStr = `${dueDate.getFullYear()}/${String(dueDate.getMonth() + 1).padStart(2, '0')}/${String(dueDate.getDate()).padStart(2, '0')}`;
          }

          // 如果是追蹤案件模式，繼承父任務的分類/分項/專案
          const inheritTask = this.qtInheritTask;
          this.qtName = this.qtName || (inheritTask ? (inheritTask.任務名稱 + '_' + (inheritTask.樣板名稱 || '').replace('自主檢查表', '')) : (template.任務名稱 || ''))
          const taskData = {
            專案名稱: inheritTask ? (inheritTask.專案名稱 || template.專案名稱 || '新安廠區鍋爐') : (template.專案名稱 || '新安廠區鍋爐'),
            樣板代碼: this.qtTemplateCode,
            樣板名稱: template.樣板名稱 || '',
            任務分類: inheritTask ? (inheritTask.任務分類 || template.任務分類 || '') : (template.任務分類 || ''),
            任務分項: inheritTask ? '追蹤案件' : (template.任務分項 || ''),
            任務名稱: this.qtName,
            負責人: this.qtAssignee,
            派工日期: todayStr,
            截止日期: dueDateStr,
            報告狀態: '未開始',
            關聯工單: this.qtParentTaskId || ''
          };

          try {
            const res = await this.api('createTask', {
              taskData,
              parentTaskId: this.qtParentTaskId || ''
            });
            if (res && res.success) {
              taskData['任務ID'] = res.taskId;
              taskData['樣板名稱'] = template.樣板名稱 || '';
              this.data.tasks.push(taskData);

              if (this.qtParentTaskId) {
                const parent = this.data.tasks.find(t => t.任務ID === this.qtParentTaskId);
                if (parent) parent['關聯工單'] = res.taskId;
              }

              this.updateLocalCache();
              this.quickTaskModalOpen = false;
              this.showToast('任務快速建立成功', 'success');
              this.activeTask = (template.樣板名稱 === '工單異常處理' && this.qtParentTaskId)
                ? (this.data.tasks.find(t => t.任務ID === this.qtParentTaskId) || taskData)
                : taskData;
              const activeCodes = String(this.activeTask.樣板代碼 || '').split(',').map(s => s.trim()).filter(Boolean);
              this.activeChecklists = this.getOrderedChecklists(activeCodes);
              this.view = 'task-detail';
              window.scrollTo(0, 0);
            } else {
              this.showToast('建立失敗，請重試', 'error');
            }
          } catch (e) {
            console.error(e);
            this.showToast('連線異常，建立失敗', 'error');
          } finally {
            this.syncing = false;
          }
        },



        showToast(message, type = 'success') {
          const id = Date.now();
          this.toasts.push({ id, message, type });
          setTimeout(() => {
            this.toasts = this.toasts.filter(t => t.id !== id);
          }, 3000);
        },

        updateLocalCache() {
          localStorage.setItem('bisms_init_data', JSON.stringify(this.data));
        },

        async api(action, payload) {
          return new Promise((resolve) => {
            if (typeof google !== 'undefined') {
              const params = { ...(payload || {}), action };

              google.script.run
                .withSuccessHandler((res) => {
                  if (res && res.success === false) {
                    console.error("API Error:", res.message);
                    this.showToast(res.message || '操作失敗', 'error');
                    resolve(null);
                  } else {
                    resolve(res && res.data ? res.data : res);
                  }
                })
                .withFailureHandler((err) => {
                  console.error("Network Error:", err);
                  this.showToast('網路連線異常', 'error');
                  resolve(null);
                })
                .handleRoute(params);
            } else {
              console.warn("未偵測到 GAS 環境，請在正式環境中執行。");
              resolve(null);
            }
          });
        },

        async fetchInitialData(skipCache = false, forceLoader = true) {
          if (forceLoader) {
            this.loading = true;
          }
          if (!skipCache) {
            const cachedData = localStorage.getItem('bisms_init_data');
            if (cachedData) {
              try {
                this.data = JSON.parse(cachedData);
                this.sanitizeTasks();
                if (!forceLoader) {
                  this.loading = false; // 只有在不強制顯示 loader 的情況下才秒速渲染
                }
                this.checkUrlTaskId();
              } catch (e) {
                console.error("Cache parse error", e);
              }
            } else {
              this.loading = true;
            }
          }

          this.syncing = true;
          // 背景取得最新資料
          const result = await this.api('getInitData');
          if (result) {
            this.data = result;
            this.sanitizeTasks();
            localStorage.setItem('bisms_init_data', JSON.stringify(result));
            this.checkUrlTaskId();
          }
          this.loading = false;
          this.syncing = false;
        },

        checkUrlTaskId() {
          try {
            // Priority 1: Check outer Google Apps Script parent frame location parameters if running inside Google Workspace environment
            if (typeof google !== 'undefined' && google.script && google.script.url) {
              google.script.url.getLocation((location) => {
                const tId = location.parameter && location.parameter.taskId;
                if (tId) {
                  const task = this.data.tasks.find(t => String(t.任務ID) === String(tId));
                  if (task) {
                    this.selectTask(task.任務ID);
                  }
                }
              });
            }

            // Priority 2: Standard/Local browser location search (localhost, development, or simple iframe fallback)
            const urlParams = new URLSearchParams(window.location.search);
            let tId = urlParams.get('taskId');
            if (!tId) {
              const hash = window.location.hash;
              if (hash && hash.includes('taskId=')) {
                const match = hash.match(/taskId=([^&]+)/);
                if (match) tId = decodeURIComponent(match[1]);
              }
            }
            if (tId) {
              const task = this.data.tasks.find(t => String(t.任務ID) === String(tId));
              if (task) {
                this.selectTask(task.任務ID);
              }
            }
          } catch (e) {
            console.error("Error reading taskId from URL", e);
          }
        },

        getParentBaseUrl() {
          const webAppUrl = (this.data && this.data.webAppUrl) || "";
          if (webAppUrl && (webAppUrl.toLowerCase().includes('/dev') || webAppUrl.toLowerCase().endsWith('dev'))) {
            return "";
          }
          try {
            const urlParams = new URLSearchParams(window.location.search);
            const parentUrl = urlParams.get('parentUrl');
            if (parentUrl) {
              localStorage.setItem('bisms_parent_url', parentUrl);
              return parentUrl;
            }
          } catch (e) { }
          try {
            if (typeof google !== 'undefined' && google.script && google.script.url) {
              google.script.url.getLocation((location) => {
                const parentUrl = location.parameter && location.parameter.parentUrl;
                if (parentUrl) {
                  localStorage.setItem('bisms_parent_url', parentUrl);
                }
              });
            }
          } catch (e) { }
          return localStorage.getItem('bisms_parent_url') || "";
        },

        getPmLink() {
          const parentUrl = this.getParentBaseUrl();
          if (parentUrl) {
            try {
              const urlObj = new URL(parentUrl);
              urlObj.searchParams.set('page', 'pm');
              return urlObj.toString();
            } catch (e) {
              return parentUrl + (parentUrl.includes('?') ? '&' : '?') + "page=pm";
            }
          }
          const baseUrl = (this.data && this.data.webAppUrl) || "";
          if (baseUrl) {
            try {
              const urlObj = new URL(baseUrl);
              urlObj.searchParams.set('page', 'pm');
              return urlObj.toString();
            } catch (e) {
              return baseUrl + (baseUrl.includes('?') ? '&' : '?') + "page=pm";
            }
          }
          try {
            const urlObj = new URL(window.location.href);
            urlObj.searchParams.set('page', 'pm');
            return urlObj.toString();
          } catch (e) {
            return "?page=pm";
          }
        },

        handleStaffChange(val) {
          this.selectedStaff = val;
          localStorage.setItem('lastSelectedStaff', val);
        },

        toggleAdminMode() {
          if (this.isAdminMode) {
            this.isAdminMode = false;
            this.statusFilter = '待辦工單';
            this.showToast('已切換回巡檢端模式', 'info');
          } else {
            this.passcodeModalOpen = true;
            this.passcodeInput = '';
            setTimeout(() => {
              const el = document.querySelector('input[type="password"]');
              if (el) el.focus();
            }, 100);
          }
        },

        submitPasscode() {
          if (this.passcodeInput === '1234') {
            this.isAdminMode = true;
            this.statusFilter = '待審工單';
            this.passcodeModalOpen = false;
            this.passcodeInput = '';
            this.showToast('身分驗證成功，已進入審查模式', 'success');
          } else {
            this.showToast('密碼錯誤，請重新輸入', 'error');
            this.passcodeInput = '';
          }
        },

        get currentDisplayTasks() {
          if (this.view === 'task-detail') {
            return this.getTasksToDisplay();
          }
          return this.filteredTasks;
        },

        getTasksForTab(tab) {
          if (!this.data || !this.data.tasks) return [];
          const mode = this.isAdminMode ? 'admin' : 'user';
          const rule = TAB_RULE_REGISTRY[mode]?.[tab];
          if (!rule) return [];

          return this.data.tasks.filter(t => {
            const staffMatch = this.selectedStaff === "全部" || t.負責人 === this.selectedStaff;
            if (!staffMatch) return false;
            const s = t.報告狀態 || "未開始";
            const cat = t.任務分類 || "";
            const sub = t.任務分項 || "";
            return rule(s, cat, sub);
          });
        },

        get baseFilteredTasks() {
          return this.getTasksForTab(this.statusFilter).sort((a, b) => {
            const timeA = a.截止日期 ? new Date(a.截止日期).getTime() : Infinity;
            const timeB = b.截止日期 ? new Date(b.截止日期).getTime() : Infinity;
            const valA = isNaN(timeA) ? Infinity : timeA;
            const valB = isNaN(timeB) ? Infinity : timeB;

            if (valA === valB) {
              const idA = String(a.任務ID || "");
              const idB = String(b.任務ID || "");
              return idA.localeCompare(idB, undefined, { numeric: true, sensitivity: 'base' });
            }
            return valA - valB;
          });
        },

        getTaskTemplateName(task) {
          if (!task) return '';
          if (task.樣板名稱) return task.樣板名稱;
          const codes = String(task.樣板代碼 || '').split(',').map(s => s.trim()).filter(Boolean);
          const found = this.data.templates?.filter(x => codes.includes(String(x.樣板代碼)));
          if (found && found.length > 0) {
            return found.map(x => x.樣板名稱).join(',');
          }
          return '未知樣板';
        },

        get templateFilteredTasks() {
          const tasks = this.baseFilteredTasks;
          if (this.selectedTemplate && this.selectedTemplate !== '全部') {
            return tasks.filter(t => this.getTaskTemplateName(t) === this.selectedTemplate);
          }
          return tasks;
        },

        get filteredTasks() {
          let tasks = this.templateFilteredTasks;
          if (this.searchQuery && this.searchQuery.trim()) {
            const query = this.searchQuery.trim().toLowerCase();
            tasks = tasks.filter(t => {
              const nameMatch = t.任務名稱 && t.任務名稱.toLowerCase().includes(query);
              const idMatch = t.任務ID && String(t.任務ID).toLowerCase().includes(query);
              return nameMatch || idMatch;
            });
          }
          return tasks;
        },

        get showSearchBar() {
          return this.templateFilteredTasks.length > 10;
        },

        get templateCapsules() {
          const tasks = this.baseFilteredTasks;
          const counts = {};
          tasks.forEach(t => {
            const name = this.getTaskTemplateName(t);
            counts[name] = (counts[name] || 0) + 1;
          });

          const list = Object.keys(counts).sort().map(name => ({
            name,
            count: counts[name]
          }));

          return [
            { name: '全部', count: tasks.length },
            ...list
          ];
        },

        getStatusConfig(status) {
          const s = status || "未開始";
          if (["未開始", "執行中", ""].includes(s)) return { label: s || '未開始', color: 'bg-blue-50 text-blue-600 border-blue-100' };
          if (s === "退回修改") return { label: '退回修改', color: 'bg-red-50 text-red-600 border-red-100' };
          if (FINISHED_STATUSES.includes(s)) return { label: s, color: 'bg-green-50 text-green-600 border-green-100' };
          return { label: s, color: 'bg-slate-50 text-slate-500 border-slate-100' };
        },

        getProcessStatusConfig(processStatus) {
          if (!processStatus) return { label: '', color: 'hidden' };
          const s = processStatus;
          if (s === "持續進行") return { label: '持續進行', color: 'bg-blue-600 text-white border-blue-700 shadow-sm' };
          if (s === "等待回覆") return { label: '等待回覆', color: 'bg-amber-500 text-white border-amber-600 shadow-sm' };
          if (s === "暫緩處理") return { label: '暫緩處理', color: 'bg-purple-600 text-white border-purple-700 shadow-sm' };
          if (s === "處理完成") return { label: '處理完成', color: 'bg-emerald-600 text-white border-emerald-700 shadow-sm' };
          return { label: s, color: 'bg-slate-200 text-slate-950 border-slate-400 font-bold shadow-sm' };
        },

        selectTask(taskId) {
          const task = this.data.tasks.find(t => t.任務ID === taskId);
          if (task) {
            this.activeTask = task;
            const activeCodes = String(task.樣板代碼 || '').split(',').map(s => s.trim()).filter(Boolean);
            this.activeChecklists = this.getOrderedChecklists(activeCodes);
            this.view = 'task-detail';
          }
        },

        getMultiModeForTemplate(templateCode) {
          if (!templateCode) return '標準一對一';
          const tpl = this.data.templates?.find(t => String(t.樣板代碼) === String(templateCode));
          return tpl ? (tpl['多零件模式'] || tpl.多零件模式 || '標準一對一') : '標準一對一';
        },

        getMultiModeForTask(taskId) {
          const task = this.data.tasks.find(t => t.任務ID === taskId);
          if (!task) return '標準一對一';
          const codes = String(task.樣板代碼 || '').split(',').map(s => s.trim()).filter(Boolean);
          const tpls = this.data.templates?.filter(t => codes.includes(String(t.樣板代碼)));
          const tpl = tpls ? tpls.find(t => (t['多零件模式'] || t.多零件模式) && (t['多零件模式'] || t.多零件模式) !== '標準一對一') || tpls[0] : null;
          return tpl ? (tpl['多零件模式'] || tpl.多零件模式 || '標準一對一') : '標準一對一';
        },

        getOrderedChecklists(codes) {
          const list = [];
          codes.forEach(code => {
            const items = this.data.checklists.filter(c => String(c.樣板代碼) === code);
            list.push(...items);
          });
          return list;
        },

        getResult(taskId, checklistId, componentId = "") {
          if (!taskId || !checklistId) return { 實際數值: "", 判定結果: "", 相片ID: "", 零件實例: "" };
          const comp = componentId || "";
          const r = this.data.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && (res.零件實例 || "") === comp);
          return r || { 實際數值: "", 判定結果: "", 相片ID: "", 零件實例: comp };
        },

        getChecklistItemInstances(taskId, checklistId) {
          const checklistItem = this.data.checklists.find(c => c.檢查ID === checklistId);
          const tplCode = checklistItem ? checklistItem.樣板代碼 : "";
          if (this.getMultiModeForTemplate(tplCode) !== '動態實例') {
            return [];
          }
          const currentResults = this.data.results.filter(res => res.任務ID === taskId && res.檢查ID === checklistId && res.零件實例);
          return currentResults.map(res => ({
            id: res.零件實例,
            name: res.零件實例,
            value: res.實際數值 || '',
            result: res.判定結果 || '',
            photoId: res.相片ID || ''
          }));
        },

        addInstance(taskId, checklistId) {
          const list = this.getChecklistItemInstances(taskId, checklistId);
          const today = new Date();
          const todayStr = today.getFullYear() +
            String(today.getMonth() + 1).padStart(2, '0') +
            String(today.getDate()).padStart(2, '0');

          if (list.length === 0) {
            const singleRes = this.data.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && !res.零件實例);
            if (singleRes && (singleRes.實際數值 || singleRes.相片ID)) {
              singleRes.零件實例 = todayStr;
              this.updateLocalCache();

              if (!this.isOffline) {
                this.api('renameComponent', {
                  taskId: taskId,
                  checklistId: checklistId,
                  oldId: '',
                  newId: todayStr
                }).catch(err => console.error("Migration to backend failed:", err));
              }
              list.push({
                id: todayStr,
                name: todayStr,
                value: singleRes.實際數值 || '',
                result: singleRes.判定結果 || '',
                photoId: singleRes.相片ID || ''
              });
            }
          }

          let nextId = "";
          console.log("[BISMS DEBUG] addInstance called", { taskId, checklistId, listLength: list.length });
          if (list.length > 0) {
            const lastItem = list[list.length - 1];
            const lastName = String(lastItem.name ?? lastItem.id ?? "");
            const match = lastName.match(/^(.*?)(\d+)$/);
            console.log("[BISMS DEBUG] lastItem info", { lastName, match });
            if (match) {
              const prefix = match[1];
              const numStr = match[2];
              let nextVal = parseInt(numStr, 10) + 1;
              let nextValStr = String(nextVal).padStart(numStr.length, '0');
              let candidate = prefix + nextValStr;
              while (true) {
                const inList = list.some(i => i.name === candidate || i.id === candidate);
                const inResults = this.data.results.some(res => res.任務ID === taskId && res.檢查ID === checklistId && res.零件實例 === candidate);
                console.log("[BISMS DEBUG] Loop 1 check", { candidate, inList, inResults });
                if (!inList && !inResults) break;
                nextVal++;
                nextValStr = String(nextVal).padStart(numStr.length, '0');
                candidate = prefix + nextValStr;
              }
              nextId = candidate;
            }
          }

          if (!nextId) {
            if (list.length === 0) {
              let candidate = todayStr;
              while (true) {
                const inResults = this.data.results.some(res => res.任務ID === taskId && res.檢查ID === checklistId && res.零件實例 === candidate);
                console.log("[BISMS DEBUG] Loop 2 check", { candidate, inResults });
                if (!inResults) break;
                let match = candidate.match(/^(.*?)(\d+)$/);
                if (match) {
                  const prefix = match[1];
                  const numStr = match[2];
                  let nextVal = parseInt(numStr, 10) + 1;
                  let nextValStr = String(nextVal).padStart(numStr.length, '0');
                  candidate = prefix + nextValStr;
                } else {
                  candidate = candidate + "_1";
                }
              }
              nextId = candidate;
            } else {
              let nextNum = list.length + 1;
              let candidate = "增設 " + nextNum;
              while (true) {
                const inList = list.some(i => i.name === candidate || i.id === candidate);
                const inResults = this.data.results.some(res => res.任務ID === taskId && res.檢查ID === checklistId && res.零件實例 === candidate);
                console.log("[BISMS DEBUG] Loop 3 check", { candidate, inList, inResults });
                if (!inList && !inResults) break;
                nextNum++;
                candidate = "增設 " + nextNum;
              }
              nextId = candidate;
            }
          }
          console.log("[BISMS DEBUG] Selected nextId:", nextId);

          let r = this.data.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && res.零件實例 === nextId);
          if (!r) {
            this.data.results.push({
              任務ID: taskId,
              檢查ID: checklistId,
              零件實例: nextId,
              實際數值: "",
              判定結果: "",
              相片ID: ""
            });
          }

          this.updateLocalCache();

          if (!this.isOffline) {
            this.api('submitResult', { taskId, checklistId, value: '', result: '', componentId: nextId })
              .catch(err => console.error("Syncing added instance to backend failed:", err));
          }
        },

        async deleteInstance(taskId, checklistId, instanceId) {
          this.data.results = this.data.results.filter(res => !(res.任務ID === taskId && res.檢查ID === checklistId && res.零件實例 === instanceId));
          this.updateLocalCache();

          if (!this.isOffline) {
            await this.api('submitResult', { taskId, checklistId, value: "", result: "", componentId: instanceId });
          } else {
            this.showToast('離線狀態，本機已清除，待連線後將同步', 'info');
          }
        },

        async renameInstance(taskId, checklistId, oldId, newId) {
          if (!newId) return;
          newId = newId.trim();
          if (newId === "" || newId === oldId) return;

          const list = this.getChecklistItemInstances(taskId, checklistId);

          if (list.some(i => i.id === newId)) {
            this.showToast('零件名稱已存在', 'error');
            return;
          }

          const oldRes = this.data.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && (res.零件實例 || "") === oldId);
          if (!oldRes) return;

          oldRes.零件實例 = newId;
          this.updateLocalCache();

          if (!this.isOffline) {
            const saveKeyNew = taskId + '_' + checklistId + '_' + newId;
            this.savingStates[saveKeyNew] = 'saving';

            try {
              const res = await this.api('renameComponent', {
                taskId: taskId,
                checklistId: checklistId,
                oldId: oldId,
                newId: newId
              });

              if (res && res.success) {
                this.savingStates[saveKeyNew] = 'saved';
                setTimeout(() => {
                  delete this.savingStates[saveKeyNew];
                }, 2000);
              } else {
                throw new Error("API return false");
              }
            } catch (err) {
              console.error("重命名零件失敗:", err);
              oldRes.零件實例 = oldId;
              this.showToast('重命名同步失敗', 'error');
              this.updateLocalCache();
              delete this.savingStates[saveKeyNew];
            }
          } else {
            this.showToast('離線狀態，已變更，連線後將同步', 'info');
          }
        },

        getTasksToDisplay() {
          if (!this.activeTask) return [];
          const tasks = [this.activeTask];
          if (this.activeTask.關聯工單) {
            const related = this.data.tasks.find(t => t.任務ID === this.activeTask.關聯工單);
            if (related && (related.報告狀態 === "執行中" || related.報告狀態 === "未開始" || related.報告狀態 === "退回修改")) tasks.unshift(related);
            else if (related) tasks.push(related);
          }
          return tasks;
        },

        getChecklistsForTask(taskId) {
          const task = this.data.tasks.find(t => t.任務ID === taskId);
          if (!task) return [];
          const codes = String(task.樣板代碼 || '').split(',').map(s => s.trim()).filter(Boolean);
          return this.getOrderedChecklists(codes);
        },

        getTaskProgress(taskId) {
          const checklists = this.getChecklistsForTask(taskId);
          let total = 0;
          let filled = 0;
          checklists.forEach(c => {
            const instances = this.getChecklistItemInstances(taskId, c.檢查ID);
            if (instances && instances.length > 0) {
              instances.forEach(ins => {
                total++;
                const r = this.getResult(taskId, c.檢查ID, ins.id);
                if (r.實際數值 !== "" || r.判定結果 !== "" || r.相片ID !== "" || (!c.邏輯型態 && c.單位或選項)) {
                  filled++;
                }
              });
            } else {
              total++;
              const r = this.getResult(taskId, c.檢查ID);
              if (r.實際數值 !== "" || r.判定結果 !== "" || r.相片ID !== "" || (!c.邏輯型態 && c.單位或選項)) {
                filled++;
              }
            }
          });
          return { total, filled };
        },

        getRelatedTaskIds(taskId) {
          const task = this.data.tasks.find(t => t.任務ID === taskId);
          const relatedIds = [];
          if (task) {
            if (task.關聯工單) {
              relatedIds.push(task.關聯工單);
            }
            this.data.tasks.forEach(t => {
              if (t.關聯工單 === taskId && !relatedIds.includes(t.任務ID)) {
                relatedIds.push(t.任務ID);
              }
            });
          }
          return { task, relatedIds };
        },

        getTabTaskCount(tab) {
          return this.getTasksForTab(tab).length;
        },

        isOverdue(dateStr) {
          if (!dateStr || String(dateStr).trim() === '' || dateStr === 'null' || dateStr === 'undefined') return false;
          const dStr = String(dateStr).replace(/-/g, '/');
          const d = new Date(dStr);
          if (isNaN(d.getTime())) return false;
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          return d.getTime() < today.getTime();
        },

        isReadOnly(taskId) {
          const task = this.data.tasks.find(t => t.任務ID === taskId);
          if (!task) return true;
          const s = task.報告狀態 || "未開始";
          if (this.isAdminMode) {
            return ["已審查結果", "已生成報告", "已結案"].includes(s);
          } else {
            return ["已提報結果", "已審查結果", "已生成報告", "已結案"].includes(s);
          }
        },

        requiresPhoto(item) {
          if (!item) return false;
          if (item.邏輯型態 === '相片') return true;
          const req = item['需附照片'];
          return ['TRUE', '是', 'V', 'v', '1', 1, true, 'true'].includes(req);
        },

        calculateAutoJudgment(item, value) {
          if (value === undefined || value === null || String(value).trim() === "") return "";
          if (item.邏輯型態 === "數值") {
            const num = parseFloat(value);
            if (isNaN(num)) return "";

            // 1. 如果有明確的「最小值」與「最大值」欄位
            const minVal = parseFloat(item.最小值);
            const maxVal = parseFloat(item.最大值);
            const hasMin = !isNaN(minVal) && item.最小值 !== "";
            const hasMax = !isNaN(maxVal) && item.最大值 !== "";

            if (hasMin && hasMax) {
              return (num >= minVal && num <= maxVal) ? "合格" : "不合格";
            } else if (hasMin) {
              return (num >= minVal) ? "合格" : "不合格";
            } else if (hasMax) {
              return (num <= maxVal) ? "合格" : "不合格";
            }

            // 2. 自動解析「判定標準」文字
            const std = item.判定標準 || "";
            // 範圍型，例如: -5 ~ +5, 10-20
            const rangeMatch = std.match(/([+-]?\d*\.?\d+)\s*[~-]\s*([+-]?\d*\.?\d+)/);
            if (rangeMatch) {
              const rMin = parseFloat(rangeMatch[1]);
              const rMax = parseFloat(rangeMatch[2]);
              return (num >= rMin && num <= rMax) ? "合格" : "不合格";
            }

            // 大於等於型，例如: >= 10
            const gteMatch = std.match(/>=\s*([+-]?\d*\.?\d+)/);
            if (gteMatch) {
              const rGte = parseFloat(gteMatch[1]);
              return (num >= rGte) ? "合格" : "不合格";
            }

            // 小於等於型，例如: <= 100
            const lteMatch = std.match(/<=\s*([+-]?\d*\.?\d+)/);
            if (lteMatch) {
              const rLte = parseFloat(lteMatch[1]);
              return (num <= rLte) ? "合格" : "不合格";
            }

            return "";
          }

          if (item.邏輯型態 === "布林") {
            const options = (item.單位或選項 || "是;否").split(";").filter(Boolean);
            if (options.length > 0) {
              // 第一個選項為合格 (e.g. 是/合格/OK)，其餘為不合格
              return (String(value).trim() === String(options[0]).trim()) ? "合格" : "不合格";
            }
          }

          return "不適用";
        },

        async saveItemResult(taskId, checklistId, value, componentId = "") {
          const task = this.data.tasks.find(text => text.任務ID === taskId);
          if (!task) return;

          const item = this.getChecklistsForTask(taskId).find(c => c.檢查ID === checklistId);
          const autoJudge = item ? this.calculateAutoJudgment(item, value) : "";

          const compId = componentId || "";
          let r = this.data.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && (res.零件實例 || "") === compId);

          // 1. 備份舊值供錯誤時還原 (Rollback) - 僅在沒有待處理的計時器時備份
          const key = compId ? taskId + "_" + checklistId + "_" + compId : taskId + "_" + checklistId;
          if (!this.saveTimeouts[key]) {
            this.saveTimeouts[key] = {
              oldActualValue: r ? r.實際數值 : "",
              oldResult: r ? r.判定結果 : "",
              timer: null,
              version: 0
            };
          }

          // 遞增版本號，用作「版本鎖」防止非同步回傳競態 (Race Conditions)
          this.saveTimeouts[key].version += 1;
          const currentVersion = this.saveTimeouts[key].version;

          // 計時開始，顯示儲存中
          this.savingStates[key] = 'saving';

          // 2. 立即、零延遲更新本地資料與 UI (樂觀渲染)
          if (r) {
            r.實際數值 = value;
            r.判定結果 = autoJudge;
          } else {
            r = {
              任務ID: taskId,
              檢查ID: checklistId,
              零件實例: compId,
              實際數值: value,
              判定結果: autoJudge,
              相片ID: ""
            };
            this.data.results.push(r);
          }

          if (task.報告狀態 === "" || task.報告狀態 === "未開始" || task.報告狀態 === "退回修改" || !task.報告狀態) {
            task.報告狀態 = "執行中";
            task.執行進度 = "持續進行";
          }

          // 3. Debounce 送出 API (延遲 800ms，輸入過程中重置計時，避免洗板與卡頓)
          if (this.saveTimeouts[key].timer) {
            clearTimeout(this.saveTimeouts[key].timer);
          }

          this.saveTimeouts[key].timer = setTimeout(async () => {
            if (this.isOffline) {
              this.showToast('離線狀態，儲存失敗', 'error');
              this.rollbackResult(taskId, checklistId, key, compId);
              return;
            }

            const res = await this.api('submitResult', { taskId, checklistId, value, result: autoJudge, componentId: compId });

            // 取得學當前的計時器備份物件（確認是否已被其他輸入強佔或清理）
            const currentTimeout = this.saveTimeouts[key];
            if (!currentTimeout) return;

            // ⚠️ 關鍵防護：若當前版號小於此 timer 觸發時的最新 version，代表使用者在 API 執行期間又有新的輸入或異動
            if (currentVersion < currentTimeout.version) {
              console.log(`[BISMS] 忽略舊版非同步 API 回傳 (${currentVersion} < 最新版 ${currentTimeout.version})`);
              return;
            }

            if (res) {
              // 成功：更新後端確切回傳的判定與狀態
              let rNew = this.data.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && (res.零件實例 || "") === compId);
              if (rNew && res.result !== undefined) rNew.判定結果 = res.result;
              if (res.newTaskStatus) task.報告狀態 = res.newTaskStatus;
              if (res.newProcessStatus) task.執行進度 = res.newProcessStatus;

              this.updateLocalCache();
              // API 請求成功後變更為『已同步』狀態
              this.savingStates[key] = 'saved';
              delete this.saveTimeouts[key]; // 完成後清除計時器快取
            } else {
              // 失敗：Rollback 還原至該輸入序列最原始的值
              r.實際數值 = currentTimeout.oldActualValue;
              r.判定結果 = currentTimeout.oldResult;
              this.showToast('資料儲存失敗，已自動還原', 'error');
              this.savingStates[key] = '';
              delete this.saveTimeouts[key];
            }
          }, 800);
        },

        rollbackResult(taskId, checklistId, key, componentId = "") {
          const task = this.data.tasks.find(t => t.任務ID === taskId);
          const compId = componentId || "";
          const r = this.data.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && (res.零件實例 || "") === compId);
          const backup = this.saveTimeouts[key];
          if (backup) {
            if (r) {
              r.實際數值 = backup.oldActualValue;
              r.判定結果 = backup.oldResult;
            }
            if (backup.timer) {
              clearTimeout(backup.timer);
            }
            delete this.saveTimeouts[key];
          }
          this.savingStates[key] = '';
        },

        async updateTaskProcessStatus(taskId, status) {
          const task = this.data.tasks.find(t => t.任務ID === taskId);
          if (!task) return;
          if (this.isOffline) {
            this.showToast('離線狀態無法更新處理進度', 'error');
            return;
          }

          const oldStatus = task.執行進度;
          task.執行進度 = status;

          const res = await this.api('updateTaskProcessStatus', { taskId, status });
          if (!res) {
            task.執行進度 = oldStatus;
          } else {
            this.updateLocalCache();
          }
        },

        triggerUpload(taskId, checklistId, componentId = "") {
          this.currentUploadTaskId = taskId;
          this.currentUploadChecklistId = checklistId;
          this.currentUploadComponentId = componentId || "";
          document.getElementById('global-photo-upload').click();
        },

        async handlePhotoUpload(event) {
          const taskId = this.currentUploadTaskId;
          const task = this.data.tasks.find(t => t.任務ID === taskId);
          if (!task) return;
          const files = Array.from(event.target.files);
          if (!files.length || !this.currentUploadChecklistId) return;

          const checklistId = this.currentUploadChecklistId;
          const checklistItem = this.data.checklists.find(c => c.檢查ID === checklistId) || {};
          const componentId = this.currentUploadComponentId || "";
          const key = componentId ? taskId + "_" + checklistId + "_" + componentId : taskId + "_" + checklistId;
          if (!this.uploadingPhotos[key]) this.uploadingPhotos[key] = [];

          // 1. 初始化排隊對象
          const newUploads = files.map((file, i) => {
            const objUrl = URL.createObjectURL(file);
            return {
              id: 'tmp_' + Date.now() + '_' + i,
              status: '處理中',
              base64: objUrl,
              objectUrl: objUrl, // 紀錄以利後續釋放記憶體
              file: file
            };
          });

          this.uploadingPhotos[key].push(...newUploads);
          event.target.value = ""; // Clear input

          // 2. 背景處理上傳
          (async () => {
            try {
              for (const up of newUploads) {
                // 壓縮與上傳
                up.base64 = await this.compressPhoto(up.file);
                up.status = "上傳中";

                const res = await this.api('submitResult', {
                  taskId,
                  checklistId,
                  base64Photo: up.base64,
                  taskName: task.任務名稱 || '',
                  templateName: task.樣板名稱 || '',
                  taskCategory: task.任務分類 || '',
                  subItemName: task.任務分項 || '',
                  checkItemTag: checklistItem.報告標籤 || '',
                  componentId: componentId
                });

                if (res && res.photoId) {
                  this.uploadingPhotos[key] = this.uploadingPhotos[key].filter(u => u.id !== up.id);

                  let r = this.data.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && (res.零件實例 || "") === componentId);
                  if (r) {
                    r.相片ID = res.photoId;
                    if (res.result) r.判定結果 = res.result;
                    if (res.newTaskStatus) task.報告狀態 = res.newTaskStatus;
                  } else {
                    this.data.results.push({
                      任務ID: taskId,
                      檢查ID: checklistId,
                      零件實例: componentId,
                      實際數值: "",
                      判定結果: res.result || "",
                      相片ID: res.photoId
                    });
                  }

                  this.updateLocalCache();
                } else {
                  up.status = '失敗';
                }
              }
            } catch (e) {
              console.error(e);
              this.showToast('照片處理發生異常', 'error');
            } finally {
              // 釋放記憶體與清理失敗的佔位
              newUploads.forEach(u => {
                if (u.objectUrl) URL.revokeObjectURL(u.objectUrl);
              });
              this.uploadingPhotos[key] = this.uploadingPhotos[key].filter(
                u => u.status !== '失敗'
              );
            }
          })();
        },

        async deletePhoto(taskId, checklistId, photoId, componentId = "") {
          const task = this.data.tasks.find(t => t.任務ID === taskId);
          if (!task) return;

          if (this.deletingPhotos.includes(photoId)) return;

          this.deletingPhotos.push(photoId);

          const compId = componentId || "";

          try {
            const res = await this.api('deletePhoto', {
              taskId: taskId,
              checklistId: checklistId,
              photoIdToDelete: photoId,
              componentId: compId
            });

            if (res) {
              let r = this.data.results.find(res => res.任務ID === taskId && res.檢查ID === checklistId && (res.零件實例 || "") === compId);
              if (r) {
                r.相片ID = res.photoIds || "";
                if (res.result !== undefined) r.判定結果 = res.result;
                if (res.newTaskStatus) task.報告狀態 = res.newTaskStatus;

                const item = this.getChecklistsForTask(taskId).find(c => c.檢查ID === checklistId);
                if (item?.邏輯型態 === '相片' && !r.相片ID && res.result === undefined) {
                  r.判定結果 = "";
                }
              }

              this.updateLocalCache();
            } else {
              this.showToast('刪除失敗，請重新整理', 'error');
            }
          } catch (e) {
            console.error("Delete failed:", e);
            this.showToast('連線異常', 'error');
          } finally {
            this.deletingPhotos = this.deletingPhotos.filter(id => id !== photoId);
          }
        },

        compressPhoto(file) {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
              const img = new Image();
              img.src = e.target.result;
              img.onload = () => {
                const canvas = document.createElement("canvas");
                const MAX = 1200;
                let w = img.width, h = img.height;
                if (w > MAX) { h *= MAX / w; w = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext("2d").drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL("image/jpeg", 0.8));
              };
            };
          });
        },

        zoomPhoto(id, list = []) {
          this.zoomPhotosList = list;
          this.zoomPhotoIndex = list.indexOf(id);
          this.photoZoomUrl = "https://drive.google.com/thumbnail?id=" + id + "&sz=w1200";
        },
        closeZoom() {
          this.photoZoomUrl = null;
          this.zoomPhotosList = [];
          this.zoomPhotoIndex = -1;
        },
        navigateZoom(direction) {
          if (!this.zoomPhotosList || this.zoomPhotosList.length <= 1) return;
          if (direction === 'prev') {
            this.zoomPhotoIndex = (this.zoomPhotoIndex - 1 + this.zoomPhotosList.length) % this.zoomPhotosList.length;
          } else {
            this.zoomPhotoIndex = (this.zoomPhotoIndex + 1) % this.zoomPhotosList.length;
          }
          const nextId = this.zoomPhotosList[this.zoomPhotoIndex];
          this.photoZoomUrl = "https://drive.google.com/thumbnail?id=" + nextId + "&sz=w1200";
        },

        async _updateTaskStatus(taskId, apiName, apiPayload, newReportStatus, newProcessStatus, successMsg, returnTo = null) {
          const task = this.data.tasks.find(t => t.任務ID === taskId);
          if (!task) return;
          if (this.isOffline) {
            this.showToast('離線狀態無法執行此操作', 'error');
            return;
          }

          const oldStatus = task.報告狀態;
          const oldProcessStatus = task.執行進度;

          task.報告狀態 = newReportStatus;
          if (newProcessStatus !== undefined) {
            task.執行進度 = newProcessStatus;
          }

          if (returnTo) {
            this.selectTask(returnTo);
          } else {
            this.view = 'task-list';
            window.scrollTo(0, 0);
            this.activeTask = null;
          }
          this.showToast(successMsg, successMsg.includes('退回') ? 'info' : 'success');

          const res = await this.api(apiName, apiPayload);
          if (!res) {
            task.報告狀態 = oldStatus;
            if (newProcessStatus !== undefined) task.執行進度 = oldProcessStatus;
            this.showToast('操作失敗，請重試', 'error');
          } else {
            this.fetchInitialData(true, false);
          }
        },

        async finishTask(taskId, returnTo = null) {
          await this._updateTaskStatus(taskId, 'finishTask', { taskId }, '已提報結果', undefined, '工單已提交審查', returnTo);
        },

        rejectTask(taskId) {
          const task = this.data.tasks.find(t => t.任務ID === taskId);
          if (!task) return;
          if (this.isOffline) {
            this.showToast('離線狀態無法退回修改', 'error');
            return;
          }
          this.rejectingTaskId = taskId;
          this.rejectReasonInput = '';
          this.rejectModalOpen = true;
        },

        async submitRejectTask() {
          const taskId = this.rejectingTaskId;
          const reason = this.rejectReasonInput;
          this.rejectModalOpen = false;

          const { relatedIds } = this.getRelatedTaskIds(taskId);

          // Reject the main task
          await this._updateTaskStatus(taskId, 'rejectTask', { taskId, remark: reason }, '退回修改', '等待回覆', '已退回修改');

          // Reject related tasks if any
          for (const relId of relatedIds) {
            await this._updateTaskStatus(relId, 'rejectTask', { taskId: relId, remark: reason }, '退回修改', '等待回覆', '已退回修改');
          }
        },

        async approveTask(taskId) {
          const { relatedIds } = this.getRelatedTaskIds(taskId);

          // Approve the main task
          await this._updateTaskStatus(taskId, 'approveTask', { taskId }, '已審查結果', undefined, '工單已審核通過');

          // Approve related tasks if any
          for (const relId of relatedIds) {
            await this._updateTaskStatus(relId, 'approveTask', { taskId: relId }, '已審查結果', undefined, '工單已審核通過');
          }
        },

        async closeTask(taskId) {
          const { relatedIds } = this.getRelatedTaskIds(taskId);

          // Close the main task
          await this._updateTaskStatus(taskId, 'closeTask', { taskId }, '已結案', undefined, '工單已結案歸檔');

          // Close related tasks if any
          for (const relId of relatedIds) {
            await this._updateTaskStatus(relId, 'closeTask', { taskId: relId }, '已結案', undefined, '工單已結案歸檔');
          }
        },

        async generateTrackingReport(taskId) {
          if (this.isOffline) {
            this.showToast('離線狀態無法產出報告', 'error');
            return;
          }
          this.showToast('正在產生追蹤報告...', 'info');
          const res = await this.api('generateTrackingReport', { taskId });
          if (res) {
            this.showToast('報告已產出！', 'success');
          }
        }
      }));
    });
  </script>
</head>

            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

  </header>

  <!-- Main Content -->
  <main class="flex-1 w-full max-w-4xl mx-auto pt-2 px-1 sm:px-4 pb-36 sm:pb-24" x-data="{
      swipeStartX: 0,
      swipeStartY: 0,
      handleMainTouchStart(e) {
        if (view !== 'task-detail') return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT' || e.target.closest('input') || e.target.closest('textarea') || e.target.closest('button') || e.target.closest('select')) return;
        this.swipeStartX = e.touches[0].clientX;
        this.swipeStartY = e.touches[0].clientY;
      },
      handleMainTouchEnd(e) {
        if (view !== 'task-detail') return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT' || e.target.closest('input') || e.target.closest('textarea') || e.target.closest('button') || e.target.closest('select')) return;
        
        let diffX = e.changedTouches[0].clientX - this.swipeStartX;
        let diffY = e.changedTouches[0].clientY - this.swipeStartY;
        
        // Horizontal swipe from right to left (diffX < -100px) with debounce ratio validation to prevent vertical scroll mistriggers
        if (diffX < -100 && Math.abs(diffY) < 60 && Math.abs(diffX) > Math.abs(diffY) * 2.5) {
          view = 'task-list';
          activeTask = null;
          window.scrollTo(0, 0);
        }
      }
    }" @touchstart="handleMainTouchStart($event)" @touchend="handleMainTouchEnd($event)">

            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

          class="relative transition-all mb-8 rounded-3xl bg-white/60 border-2 border-dashed shadow-sm px-1 py-4 sm:p-4"
          :class="view === 'task-detail' ?  (currentTask.任務ID === activeTask?.關聯工單 ? ' border-purple-200 bg-purple-100/50 ' : ' border-blue-300 bg-blue-100/50 ') : ''">

          <!-- 任務摘要卡片 上方標籤 (共用 Header) -->

                :class="view === 'task-detail' && currentTask.任務ID === activeTask?.關聯工單 ? 'bg-purple-100 text-purple-700 border-purple-200' : ''">

                x-text="'⚠️逾期'">
              </div>

              <div x-show="currentTask.執行進度" :class="getProcessStatusConfig(currentTask.執行進度)?.color"
