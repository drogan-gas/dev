                x-text="getProcessStatusConfig(currentTask.執行進度)?.label">
              </div>
              <!-- 報告狀態 -->
              <div x-show="currentTask.報告狀態!=='執行中' || !currentTask.執行進度"
                :class="getStatusConfig(currentTask.報告狀態).color"
                class="px-2.5 py-0.5 rounded-full text-[10px] sm:text-[11px] font-black border shadow-sm tracking-wider"
                x-text="getStatusConfig(currentTask.報告狀態).label">
              </div>
            </div>
          </div>
          <!-- 任務摘要卡片 (共用 Header) -->
          <div @click="if(view === 'task-list') selectTask(currentTask.任務ID)"
            class="bg-white px-3.5 py-3 rounded-2xl shadow-sm border-2 transition-all" :class="[
              view === 'task-list' ? 'cursor-pointer active:scale-[0.98] border-slate-200 border-l-[6px] border-l-blue-600' : 
              (currentTask.任務ID === activeTask?.關聯工單 ? 'border-purple-300 border-l-[6px] border-l-purple-600 bg-purple-50/20' : 'border-slate-200 border-l-[6px] border-l-blue-600 bg-white')
            ]">
            <div class="flex justify-between items-start ">
              <div>
                <div class="text-base font-black text-blue-500 uppercase tracking-widest flex items-center gap-1">
                  <span x-text="getTaskTemplateName(currentTask)"></span>
                </div>
                <h3 class="font-black text-lg text-slate-800" x-text="currentTask.任務名稱"></h3>
              </div>
            </div>

            <div class="mt-3 flex flex-wrap gap-2 items-center text-[11px] font-bold">
              <!-- 任務類別 -->
              <div class="flex items-center gap-1.5 bg-slate-100/50 px-2 py-1 rounded-md text-slate-500">
                <span x-text="'🏷️ ' + currentTask.任務分類 + ' · ' + currentTask.任務分項"></span>
              </div>
              <!-- 負責人 -->
              <div x-show="selectedStaff === '全部' || currentTask.負責人 !== selectedStaff"
                class="flex items-center gap-1.5 bg-blue-50 px-2 py-1 rounded-md text-blue-600">
                <span x-text="'👷 ' + currentTask.負責人"></span>
              </div>
              <!-- 截止日期 -->
              <div x-show="currentTask.截止日期" class="flex items-center gap-1.5 px-2 py-1 rounded-md"
                :class="isOverdue(currentTask.截止日期) ? 'bg-red-50 text-red-600 animate-pulse' : 'bg-slate-50 text-slate-500'">
                <span x-text="isOverdue(currentTask.截止日期) ? '⚠️' : '📅'"></span>
                <span x-text="currentTask.截止日期"></span>
              </div>
              <!-- 關聯工單 -->
              <div x-show="currentTask.關聯工單"
                class="flex items-center gap-1.5 px-2 py-1 rounded-md bg-purple-50 text-purple-600">
                <span x-text="'🔗 ' + currentTask.關聯工單"></span>
              </div>
            </div>

            <!-- 補充說明 -->
            <div x-show="currentTask.報告狀態==='退回修改' && currentTask.補充說明"
              class="flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded-md text-red-600 font-bold mt-2">
              <span x-text="'⚠ ' + currentTask.補充說明"></span>
            </div>

            <!-- 執行進度切換按鈕 (僅在詳細視圖顯示) -->
            <template
              x-if="view === 'task-detail' && (currentTask.報告狀態 === '執行中' || currentTask.報告狀態 === '未開始'|| currentTask.報告狀態 === '')">
              <div class="mt-4 bg-white rounded-2xl px-1 py-1 sm:p-2 border-2 border-slate-100 shadow-sm space-y-3">
                <div class="grid grid-cols-3 gap-1.5 sm:gap-2">
                  <template x-for="status in ['持續進行', '等待回覆', '暫緩處理']">
                    <button
                      @click.stop="updateTaskProcessStatus(currentTask.任務ID, currentTask.執行進度 === status ? '' : status)"
                      class="py-2.5 px-1 rounded-xl text-base sm:text-lg font-black transition-all border-2 active:scale-95 outline-none"
                      :class="currentTask.執行進度 === status ? 'bg-orange-500 text-white border-orange-600 shadow-orange-100 shadow-lg' : 'bg-slate-50 text-slate-400 border-slate-100 hover:bg-slate-100'"
                      :disabled="currentTask.報告狀態 !== '執行中'" x-text="status">
                    </button>
                  </template>
                </div>
              </div>
            </template>
          </div>

          <!-- 只在詳細視圖顯示的下半部內容 (檢查項目與按鈕) -->
          <template x-if="view === 'task-detail'">
            <div>
              <!-- 檢查項目清單 -->
              <div class="space-y-4">
                <template x-for="item in getChecklistsForTask(currentTask.任務ID)" :key="item.檢查ID">
                  <div class="bg-white rounded-2xl border-2 overflow-hidden shadow-soft"
                    :class="(getResult(currentTask.任務ID, item.檢查ID).實際數值) ? 'border-slate-200' : (currentTask.任務ID === activeTask?.關聯工單 ? ' border-purple-600 ring-4 ring-purple-100/70' : ' border-blue-600 ring-4 ring-blue-100/70')">
                    <div class="px-3.5 pt-4 sm:px-5 sm:pt-5 bg-slate-50/50 flex justify-between items-start gap-2">
                      <div class="flex-1 min-w-0">
                        <h4 class="font-black text-lg text-slate-900" x-text="'📝 ' + item.檢查項目"></h4>
                        <div x-show="item.判定標準" class="pt-1 pb-2 text-sm text-slate-500 font-bold whitespace-pre-line"
                          x-text="item.判定標準"></div>
                      </div>

                      <!-- Status / Judgment Badge -->
                      <div class="flex items-center gap-1.5 shrink-0 pt-0.5">
                        <!-- 儲存中 / 已同步 Indicator -->
                        <template x-if="savingStates[currentTask.任務ID + '_' + item.檢查ID]">
                          <span class="inline-flex items-center text-xs select-none transition-all mr-1">
                            <template x-if="savingStates[currentTask.任務ID + '_' + item.檢查ID] === 'saving'">
                              <svg class="animate-spin h-4 w-4 text-orange-500 flex-shrink-0" fill="none"
                                viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                  stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                              </svg>
                            </template>
                            <template x-if="savingStates[currentTask.任務ID + '_' + item.檢查ID] === 'saved'">
                              <svg class="h-4 w-4 text-emerald-500 flex-shrink-0" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                              </svg>
                            </template>
                          </span>
                        </template>

                        <!-- Case 1: Unfilled -->
                        <template
                          x-if="!getResult(currentTask.任務ID, item.檢查ID).實際數值 && !getResult(currentTask.任務ID, item.檢查ID).相片ID">
                          <span
                            class="px-2.5 py-1 bg-blue-700 text-white text-[10px] sm:text-xs font-black rounded-full uppercase tracking-wider shadow-md shadow-blue-100 animate-pulse whitespace-nowrap"
                            x-text="['數值', '布林'].includes(item.邏輯型態) ? '待填數據' : '待填寫'"></span>
                        </template>

                        <!-- Case 2: Filled -->
                        <template
                          x-if="getResult(currentTask.任務ID, item.檢查ID).實際數值 || getResult(currentTask.任務ID, item.檢查ID).相片ID">
                          <div class="flex items-center">
                            <!-- Numeric / Boolean has evaluation result -->
                            <template x-if="['數值', '布林'].includes(item.邏輯型態)">
                              <span
                                class="px-2.5 py-1 rounded-full text-[10px] sm:text-xs font-black uppercase shadow-sm whitespace-nowrap"
                                :class="getResult(currentTask.任務ID, item.檢查ID).判定結果 === '合格' ? 'bg-green-600 text-white shadow-green-100' : 
                                     (getResult(currentTask.任務ID, item.檢查ID).判定結果 === '不合格' ? 'bg-red-600 text-white shadow-red-100' : 'bg-blue-700 text-white animate-pulse')"
                                x-text="getResult(currentTask.任務ID, item.檢查ID).判定結果 || '待填數據'"></span>
                            </template>
                            <!-- Other types show "已填寫" -->
                            <template x-if="!['數值', '布林'].includes(item.邏輯型態)">
                              <span
                                class="px-2.5 py-1 bg-green-100 text-green-700 border border-green-200 text-[10px] sm:text-xs font-black rounded-full uppercase whitespace-nowrap">已填寫</span>
                            </template>
                          </div>
                        </template>
                      </div>
                    </div>

                    <div class="p-3.5 pt-0 sm:p-5 sm:pt-0 space-y-2">
                      <template x-if="getChecklistItemInstances(currentTask.任務ID, item.檢查ID).length === 0">
                        <div class="space-y-2">
                          <template x-if="item.邏輯型態 === '數值'">
                            <div class="relative flex-1">
                              <input type="number" :value="getResult(currentTask.任務ID, item.檢查ID).實際數值"
                                @input="saveItemResult(currentTask.任務ID, item.檢查ID, $event.target.value)"
                                @focus="$event.target.scrollIntoView({ behavior: 'smooth', block: 'center' })"
                                onwheel="this.blur()" :disabled="isReadOnly(currentTask.任務ID)" placeholder="0.00"
                                inputmode="decimal"
                                class="w-full h-16 bg-slate-50 border-2 border-slate-300 rounded-xl px-4 text-2xl font-black text-blue-900 outline-none focus:bg-white focus:border-blue-800 focus:ring-4 focus:ring-blue-100 transition-all shadow-inner disabled:opacity-50" />
                              <template x-if="item.單位或選項">
                                <span
                                  class="absolute right-2 top-1/2 -translate-y-1/2 text-base font-black text-slate-400 whitespace-nowrap pointer-events-none"
                                  x-text="item.單位或選項"></span>
                              </template>
                            </div>
                          </template>

                          <template x-if="item.邏輯型態 === '布林'">
                            <div x-data="{ options: (item.單位或選項 || '是;否').split(';').filter(Boolean) }"
                              class="flex gap-2">
                              <template x-for="o in options">
                                <button @click="saveItemResult(currentTask.任務ID, item.檢查ID, o)"
                                  :disabled="isReadOnly(currentTask.任務ID)"
                                  :class="getResult(currentTask.任務ID, item.檢查ID).實際數值 === o ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 text-slate-500'"
                                  class="flex-1 py-4 rounded-xl font-black text-lg transition-all" x-text="o"></button>
                              </template>
                            </div>
                          </template>

                          <template x-if="item.邏輯型態 === '多選'">
                            <div x-data="{ options: (item.單位或選項 || '').split(';').filter(Boolean) }"
                              x-init="if (options.length === 1 && !getResult(currentTask.任務ID, item.檢查ID).實際數值 && !isReadOnly(currentTask.任務ID)) saveItemResult(currentTask.任務ID, item.檢查ID, options[0])"
                              class="w-full">
                              <template x-if="options.length <= 4 && options.length > 0">
                                <div class="grid grid-cols-2 gap-3">
                                  <template x-for="opt in options">
                                    <button @click="saveItemResult(currentTask.任務ID, item.檢查ID, opt)"
                                      :disabled="isReadOnly(currentTask.任務ID)"
                                      :class="getResult(currentTask.任務ID, item.檢查ID).實際數值 === opt ? 'bg-blue-800 text-white shadow-xl border-blue-900' : 'bg-slate-100 text-slate-600 border-slate-200'"
                                      class="py-4 rounded-xl font-black text-base border-2 transition-all active:scale-95"
                                      x-text="opt"></button>
                                  </template>
                                </div>
                              </template>
                              <template x-if="options.length > 4">
                                <div class="relative">
                                  <select :value="getResult(currentTask.任務ID, item.檢查ID).實際數值"
                                    @change="saveItemResult(currentTask.任務ID, item.檢查ID, $event.target.value)"
                                    :disabled="isReadOnly(currentTask.任務ID)"
                                    class="w-full h-16 bg-slate-100 border-2 border-slate-200 rounded-xl px-4 text-lg font-black text-blue-800 outline-none focus:bg-white focus:border-blue-700 appearance-none shadow-inner disabled:opacity-50">
                                    <option value="">請點擊選擇...</option>
                                    <template x-for="opt in options">
                                      <option :value="opt"
                                        :selected="getResult(currentTask.任務ID, item.檢查ID).實際數值 === opt" x-text="opt">
                                      </option>
                                    </template>
                                  </select>
                                </div>
                              </template>
                            </div>
                          </template>

                          <template x-if="item.邏輯型態 === '文字'">
                            <textarea :value="getResult(currentTask.任務ID, item.檢查ID).實際數值"
                              @change="saveItemResult(currentTask.任務ID, item.檢查ID, $event.target.value)"
                              @focus="$event.target.scrollIntoView({ behavior: 'smooth', block: 'center' })"
                              :disabled="isReadOnly(currentTask.任務ID)"
                              class="w-full h-24 bg-slate-50 border-2 border-slate-300 rounded-xl p-4 font-bold text-blue-900 placeholder:text-slate-400 outline-none focus:bg-white focus:border-blue-800 focus:ring-4 focus:ring-blue-100 transition-all shadow-inner disabled:opacity-50"
                              :placeholder="(!item.判定標準 ? item.檢查項目 : item.判定標準) + '...'"></textarea>
                          </template>

                          <template x-if="!item.邏輯型態">
                            <div class="w-full px-4 flex items-center justify-between"
                              x-init="if (!getResult(currentTask.任務ID, item.檢查ID).實際數值 && !isReadOnly(currentTask.任務ID) && item.單位或選項) saveItemResult(currentTask.任務ID, item.檢查ID, item.單位或選項)">
                              <span class="font-bold text-blue-800 text-xl" x-text="item.單位或選項"></span>
                            </div>
                          </template>

                          <div x-show="requiresPhoto(item)" class="mt-4 border-t border-slate-100 pt-3">
                            <div class="grid grid-cols-3 gap-3 sm:grid-cols-5 sm:gap-4">
                              <!-- 1. 渲染已存在的照片 -->
                              <template
                                x-for="(p, pIdx) in (getResult(currentTask.任務ID, item.檢查ID).相片ID || '').split(',').map(s => s.trim()).filter(Boolean)"
                                :key="p">
                                <div
                                  class="relative aspect-square bg-slate-100 rounded-lg border border-slate-200 overflow-hidden shadow-inner group">
                                  <img :src="'https://drive.google.com/thumbnail?id='+p+'&sz=w200'"
                                    referrerpolicy="no-referrer"
                                    class="w-full h-full object-cover transition-transform group-active:scale-110 cursor-pointer"
                                    @click="zoomPhoto(p, (getResult(currentTask.任務ID, item.檢查ID).相片ID || '').split(',').map(s => s.trim()).filter(Boolean))" />
                                  <div
                                    class="absolute top-0 right-0 p-1 bg-black/30 text-white text-base font-mono rounded-bl z-10"
                                    x-text="'#' + (pIdx + 1)"></div>

                                  <!-- 刪除中遮罩 (轉圈圈) - 整合為統一的縮圖狀態樣式 -->
                                  <template x-if="deletingPhotos.includes(p)">
                                    <div
                                      class="absolute inset-0 bg-black/60 backdrop-blur-[2px] flex flex-col items-center justify-center z-20">
                                      <div class="w-8 h-8 text-white flex items-center justify-center">
                                        <div class="w-full h-full">
                                          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                            stroke-linecap="round" stroke-linejoin="round"
                                            class="w-full h-full animate-spin">
                                            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                                            <path d="M21 3v5h-5" />
                                            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
                                            <path d="M8 16H3v5" />
                                          </svg>
                                        </div>
                                      </div>
                                      <span class="text-[12px] font-bold text-white mt-1.5 drop-shadow-md"
                                        style="font-family: 'Noto Sans TC', sans-serif;">刪除中</span>
                                    </div>
                                  </template>

                                  <button x-show="!isReadOnly(currentTask.任務ID) && !deletingPhotos.includes(p)"
                                    @click.stop="deletePhoto(currentTask.任務ID, item.檢查ID, p)"
                                    class="absolute top-1 left-1 bg-red-500/85 hover:bg-red-600 text-white w-6 h-6 sm:w-7 sm:h-7 rounded-full backdrop-blur transition-all disabled:opacity-50 z-10 shadow-sm active:scale-90 flex items-center justify-center">
                                    <div
                                      class="w-3.5 h-3.5 sm:w-4 sm:h-4 [&>svg]:w-full [&>svg]:h-full flex items-center justify-center">
                                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" class="w-full h-full">
                                        <path d="M3 6h18" />
                                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                                        <line x1="10" y1="11" x2="10" y2="17" />
                                        <line x1="14" y1="11" x2="14" y2="17" />
                                      </svg>
                                    </div>
                                  </button>
                                </div>
                              </template>

                              <!-- 2. 渲染上傳中的占位格 -->
                              <template x-for="u in (uploadingPhotos[currentTask.任務ID+'_'+item.檢查ID] || [])"
                                :key="u.id">
                                <div
                                  class="relative aspect-square bg-slate-100 rounded-lg border border-slate-200 overflow-hidden shadow-inner flex items-center justify-center opacity-70">
                                  <template x-if="u.base64">
                                    <img :src="u.base64" class="w-full h-full object-cover absolute inset-0 blur-sm" />
                                  </template>
                                  <div
                                    class="z-20 flex flex-col items-center justify-center absolute inset-0 bg-black/10">
                                    <div class="w-8 h-8 text-white flex items-center justify-center">
                                      <div class="w-full h-full">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                          stroke-linecap="round" stroke-linejoin="round"
                                          class="w-full h-full animate-spin">
                                          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                                          <path d="M21 3v5h-5" />
                                          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
                                          <path d="M8 16H3v5" />
                                        </svg>
                                      </div>
                                    </div>
                                    <span class="text-[12px] font-bold text-white mt-1.5 drop-shadow-md"
                                      x-text="u.status" style="font-family: 'Noto Sans TC', sans-serif;"></span>
                                  </div>
                                </div>
                              </template>

                              <!-- 3. 新增按鈕 -->
                              <div class="relative aspect-square" x-show="!isReadOnly(currentTask.任務ID)">
                                <button @click="triggerUpload(currentTask.任務ID, item.檢查ID)"
                                  :class="item.邏輯型態 === '相片' ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-slate-50 text-slate-400 border-slate-300'"
                                  class="w-full h-full rounded-lg border-2 border-dashed flex flex-col items-center justify-center gap-1 transition-all active:scale-95 outline-none">
                                  <div class="text-blue-600">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                      fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                      stroke-linejoin="round" class="w-6 h-6">
                                      <path
                                        d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" />
                                      <circle cx="12" cy="13" r="3" />
                                    </svg>
                                  </div>
                                  <span class="text-xs font-black">新增照片</span>
                                </button>
                              </div>
                            </div>
                          </div>
                        </div>
                      </template>

                      <!-- 如果有零件實例，渲染實例清單，否則渲染單一標準輸入 -->
                      <template x-if="getChecklistItemInstances(currentTask.任務ID, item.檢查ID).length > 0">
                        <div class="space-y-3 mt-3">
                          <template x-for="ins in getChecklistItemInstances(currentTask.任務ID, item.檢查ID)" :key="ins.id">
                            <div class="p-3 bg-slate-50 border border-slate-200 rounded-xl relative">
                              <!-- 實例標題與刪除按鈕 -->
                              <div class="flex items-center justify-between pb-2 border-b border-slate-200/60 mb-2">
                                <span class="text-sm font-black text-slate-700 flex items-center gap-1">
                                  🏷️
                                  <template x-if="isReadOnly(currentTask.任務ID)">
                                    <span x-text="ins.name" class="text-blue-600"></span>
                                  </template>
                                  <template x-if="!isReadOnly(currentTask.任務ID)">
                                    <input type="text" :value="ins.name"
                                      @change="renameInstance(currentTask.任務ID, item.檢查ID, ins.id, $event.target.value)"
                                      class="bg-transparent border-b border-dashed border-slate-300 focus:border-blue-500 focus:bg-white px-1.5 py-0.5 rounded text-sm text-blue-600 font-black w-28 outline-none"
                                      placeholder="零件名稱" />
                                  </template>
                                </span>

                                <div class="flex items-center gap-2">
                                  <!-- 儲存中 / 已同步 Indicator -->
                                  <template x-if="savingStates[currentTask.任務ID + '_' + item.檢查ID + '_' + ins.id]">
                                    <span class="inline-flex items-center text-xs select-none transition-all">
                                      <template
                                        x-if="savingStates[currentTask.任務ID + '_' + item.檢查ID + '_' + ins.id] === 'saving'">
                                        <svg class="animate-spin h-4 w-4 text-orange-500" fill="none"
                                          viewBox="0 0 24 24">
                                          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                            stroke-width="4"></circle>

  <!-- Zoom Modal -->
  <div x-show="photoZoomUrl" x-data="{
      startY: 0,
      startX: 0,
      diffY: 0,
      diffX: 0,
      isSwiping: false,
      handleTouchStart(e) {
        if (e.touches.length !== 1) return;
        this.startY = e.touches[0].screenY;
        this.startX = e.touches[0].screenX;
        this.diffY = 0;
        this.diffX = 0;
        this.isSwiping = true;
      },
      handleTouchMove(e) {
        if (!this.isSwiping || e.touches.length !== 1) return;
        this.diffY = e.touches[0].screenY - this.startY;
        this.diffX = e.touches[0].screenX - this.startX;
      },
      handleTouchEnd() {
        if (!this.isSwiping) return;
        this.isSwiping = false;
        
        // 1. Swipe down threshold (80px) to close image zoom
        if (this.diffY > 80 && Math.abs(this.diffY) > Math.abs(this.diffX)) {
          this.closeZoom();
        } 
        // 2. Swipe left / right threshold (60px) to navigate images
        else if (Math.abs(this.diffX) > 60 && Math.abs(this.diffX) > Math.abs(this.diffY)) {
          if (this.diffX < 0) {
            this.navigateZoom('next');
          } else {
            this.navigateZoom('prev');
          }
        }
        
        this.diffY = 0;
        this.diffX = 0;
      }
    }" @touchstart="handleTouchStart($event)" @touchmove="handleTouchMove($event)" @touchend="handleTouchEnd()"
    class="fixed inset-0 z-[100] bg-slate-950/95 backdrop-blur-md flex flex-col items-center justify-between p-4 select-none touch-none animate-fade-in"
    @click="closeZoom()">

          <span x-text="'相片 ' + (zoomPhotoIndex + 1) + ' / ' + zoomPhotosList.length"></span>
        </template>
      </div>
      <button class="text-white hover:text-red-400 active:scale-90 transition-all p-2 rounded-full bg-white/10"
        @click="closeZoom()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" class="w-5 h-5">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Main Viewport containing Image and Side controls -->
    <div class="relative flex-1 w-full flex items-center justify-center z-0" @click.stop>
      <!-- Left side click trigger (Desktop pointer fallback) -->
      <button x-show="zoomPhotosList.length > 1" @click="navigateZoom('prev')"
        class="hidden sm:flex absolute left-4 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 transition-all text-white items-center justify-center border border-white/10">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="3" class="w-5 h-5">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>

      <!-- Zoomed Image Container with Dynamic Spring Offset Translation feedback -->
      <div
        class="max-w-full max-h-[80vh] flex items-center justify-center overflow-hidden pointer-events-none transition-transform duration-200"
        :style="'transform: translate3d(' + diffX + 'px, ' + diffY + 'px, 0)'">
        <img :src="photoZoomUrl"
          class="max-w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border border-white/10 select-none" />
      </div>

      <!-- Right side click trigger (Desktop pointer fallback) -->
      <button x-show="zoomPhotosList.length > 1" @click="navigateZoom('next')"
        class="hidden sm:flex absolute right-4 w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 transition-all text-white items-center justify-center border border-white/10">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="3" class="w-5 h-5">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>

    <!-- Bottom Instructions Tip -->
    <div
      class="text-[11px] font-black tracking-wide text-slate-400 py-2 select-none pointer-events-none z-10 text-center"
      @click.stop>
      💡 可向左右滑動切換照片，或向下拖曳關閉預覽
    </div>
  </div>

  <!-- Rejection Modal -->
  <div x-show="rejectModalOpen" x-transition.opacity x-cloak
    class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4"
    @click="rejectModalOpen = false">
    <div class="bg-white rounded-3xl p-6 shadow-2xl max-w-sm w-full mx-4 border border-slate-100 text-center relative"
      @click.stop>
      <div class="w-12 h-12 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <div x-text="'❌'" class="w-6 h-6"></div>
      </div>
      <h3 class="text-lg font-black text-slate-800 mb-1">退回修改工單</h3>
      <p class="text-xs text-slate-400 mb-4">請填寫退回此工單的修改原因（選填）</p>

      <textarea x-model="rejectReasonInput"
        @focus="$event.target.scrollIntoView({ behavior: 'smooth', block: 'center' })"
        class="w-full bg-slate-50 border-2 border-slate-300 rounded-2xl p-4 text-sm font-bold text-slate-800 outline-none focus:ring-4 focus:ring-red-100 focus:border-red-600 focus:bg-white transition-all mb-4 h-24 resize-none"
        placeholder="請輸入具體的退回原因，以利巡檢員修改..."></textarea>

      <div class="flex gap-2">
        <button type="button" @click="rejectModalOpen = false"
          class="flex-1 py-3 px-4 bg-slate-100 hover:bg-slate-200 active:scale-95 transition-all text-slate-700 rounded-2xl font-black text-sm">
          取消
        </button>
        <button type="button" @click="submitRejectTask()"
          class="flex-1 py-3 px-4 bg-red-600 hover:bg-red-700 active:scale-95 transition-all text-white rounded-2xl font-black text-sm shadow-md shadow-red-200">
          確認退回
        </button>
      </div>
    </div>
  </div>

  <!-- Passcode Modal -->
  <div x-show="passcodeModalOpen" x-transition.opacity x-cloak
    class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4"
    @click="passcodeModalOpen = false">
    <div class="bg-white rounded-3xl p-6 shadow-2xl max-w-[320px] w-full mx-4 border border-slate-200 text-center"
      @click.stop>
      <div class="w-12 h-12 bg-yellow-100 text-yellow-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <div class="w-6 h-6 flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
            <path
              d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l8-2a1 1 0 0 1 .48 0l8 2A1 1 0 0 1 20 6z" />
            <line x1="12" x2="12" y1="8" y2="12" />
            <line x1="12" x2="12.01" y1="16" y2="16" />
          </svg>
        </div>
      </div>
      <h3 class="text-lg font-black text-slate-800 mb-1">進入審查模式</h3>
      <p class="text-xs text-slate-500 mb-4 font-bold">請輸入管理密碼以驗證身分</p>

      <form @submit.prevent="submitPasscode()">
        <input type="password" x-model="passcodeInput" maxlength="4" inputmode="numeric" pattern="[0-9]*"
          @focus="$event.target.scrollIntoView({ behavior: 'smooth', block: 'center' })"
          class="w-full text-center tracking-[1em] text-2xl font-black bg-slate-50 border-2 border-slate-300 rounded-2xl py-3 px-4 focus:ring-4 focus:ring-yellow-100 focus:border-yellow-600 focus:outline-none mb-4 text-slate-900"
          placeholder="••••" />

        <div class="flex gap-2">
          <button type="button" @click="passcodeModalOpen = false"
            class="flex-1 py-3 px-4 bg-slate-100 hover:bg-slate-200 active:scale-95 transition-all text-slate-700 rounded-2xl font-black text-sm">
            取消
          </button>
          <button type="submit"
            class="flex-1 py-3 px-4 bg-yellow-500 hover:bg-yellow-600 active:scale-95 transition-all text-white rounded-2xl font-black text-sm shadow-md shadow-yellow-200">
            驗證
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Floating Action Buttons (FAB) -->
  <div x-show="view === 'task-list' && statusFilter === '工程管理'" x-transition.opacity x-cloak
    class="fixed right-6 sm:right-12 bottom-12 z-40 flex flex-col gap-3">

    <!-- Quick Task FAB (Admin Only) -->
    <button @click="showQuickTaskModal()"
      class="w-14 h-14 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white active:scale-95 rounded-full flex items-center justify-center shadow-2xl transition-all"
      title="快速生成任務">
      <span class="text-2xl font-black">⚡</span>
    </button>
  </div>

  <!-- Floating Action Buttons (FAB) - Detail View -->
  <div
    x-show="view === 'task-detail' && activeTask && !activeTask.關聯工單 && activeTask.任務分類 !== '工程管理' && !isReadOnly(activeTask.任務ID)"
    x-transition.opacity x-cloak class="fixed right-6 sm:right-12 bottom-12 z-40 flex flex-col gap-3">

    <!-- Follow Up FAB -->
    <button @click="showFollowUpModal(activeTask.任務ID)"
      class="w-14 h-14 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white active:scale-95 rounded-full flex items-center justify-center shadow-2xl transition-all"
      title="工單異常處理">
      <span class="text-2xl font-black">📋</span>
    </button>
  </div>


  <!-- Quick Task Modal -->
  <div x-show="quickTaskModalOpen" x-transition.opacity x-cloak
    class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-md flex items-start sm:items-center justify-center p-2 sm:p-4"
    @click="quickTaskModalOpen = false">
    <div
      class="bg-white rounded-3xl p-2 sm:p6 shadow-2xl max-w-md w-full mx-2 sm:mx-4 border border-slate-100 flex flex-col max-h-[85vh] relative"
      @click.stop>
      <!-- Title -->
      <div class="flex items-center gap-2 mb-2 ">
        <div class="w-8 h-8 rounded-xl flex items-center justify-center"
          :class="isFollowUpMode ? 'bg-orange-100 text-orange-600' : 'bg-amber-100 text-amber-600'">
          <span class="text-xl" x-text="isFollowUpMode ? '📋' : '⚡'"></span>
        </div>
        <h3 class="text-xl font-black text-slate-800" x-text="isFollowUpMode ? '工單異常處理' : '新增工程項目'"></h3>
      </div>

      <!-- Content Form (scrollable) -->
      <div class="flex-1 overflow-y-auto pr-1 space-y-4 no-scrollbar">
        <!-- 任務名稱 -->
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">任務名稱 *</label>
          <input type="text" x-model="qtName"
            @focus="$event.target.scrollIntoView({ behavior: 'smooth', block: 'center' })"
            class="w-full border-2 border-orange-200 bg-orange-50/50 rounded-2xl px-4 py-3 font-bold text-slate-900 outline-none focus:border-amber-600 focus:bg-white transition-colors placeholder:text-slate-400"
            placeholder="請輸入任務名稱..." />
        </div>

        <!-- 樣板選單：一般模式篩選 預設任務=true；追蹤案件模式直接顯示選擇的樣板 -->
        <div x-show="!isFollowUpMode">
          <label class="block text-xs font-bold text-slate-400 mb-1">選擇表單 *</label>
          <select x-model="qtTemplateCode" @change="handleQtTemplateChange($event.target.value)"
            class="w-full bg-orange-50 border-2 border-orange-100 rounded-2xl px-4 py-3 font-bold text-slate-700 outline-none focus:border-amber-500 focus:bg-white transition-colors">
            <option value="">-- 請選擇表單 --</option>
            <template
              x-for="t in data.templates?.filter(x => (x.預設任務 === true || x.預設任務 === 'TRUE' || x.預設任務 === 1 || x.預設任務 === 'true') && (!qtFilterCategory || x.任務分類 === qtFilterCategory))"
              :key="t.樣板代碼">
              <option :value="t.樣板代碼" x-text="t.樣板名稱"></option>
            </template>
          </select>
        </div>

        <!-- 追蹤案件模式：顯示固定樣板名稱 -->
        <div x-show="isFollowUpMode" class="bg-orange-50 border border-orange-100 rounded-2xl px-4 py-3">
          <p class="font-black text-orange-700 mt-0.5"
            x-text="data.templates?.find(t => t.樣板代碼 === qtTemplateCode)?.樣板名稱 || '工單異常處理'"></p>
        </div>


        <!-- 負責人 -->
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1">指派負責人 *</label>
          <select x-model="qtAssignee"
            class="w-full bg-orange-50 border-2 border-orange-100 rounded-2xl px-4 py-3 font-bold text-slate-700 outline-none focus:border-amber-500 focus:bg-white transition-colors">
            <option value="">-- 請選擇負責人 --</option>
            <template x-for="s in data.staff" :key="s.人員姓名">
              <option :value="s.人員姓名" x-text="s.人員姓名"></option>
            </template>
          </select>
        </div>
      </div>

      <!-- Footer Actions -->
      <div class="flex gap-2 mt-6 pt-4 border-t border-slate-100">
        <button type="button" @click="quickTaskModalOpen = false" :disabled="syncing"
          class="flex-1 py-3.5 px-4 bg-slate-100 hover:bg-slate-200 active:scale-95 transition-all text-slate-600 rounded-2xl font-black text-sm disabled:opacity-50 disabled:cursor-not-allowed">
          取消
        </button>
        <button type="button" @click="submitQuickTask()" :disabled="syncing"
          class="flex-1 py-3.5 px-4 bg-amber-500 hover:bg-amber-600 shadow-amber-100 text-white rounded-2xl font-black text-sm shadow-md active:scale-95 transition-all flex items-center justify-center gap-1.5 disabled:opacity-50 disabled:cursor-not-allowed">
          <template x-if="syncing">
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>
          </template>
          <span x-text="syncing ? '處理中...' : '生成任務'"></span>
        </button>
      </div>
    </div>
  </div>

  <input type="file" id="global-photo-upload" accept="image/*" multiple class="hidden"
    @change="handlePhotoUpload($event)" />

  <!-- Toast Container -->
  <div
    class="fixed bottom-12 left-1/2 -translate-x-1/2 z-[10000] flex flex-col gap-2 w-full max-w-[300px] pointer-events-none">
    <template x-for="t in toasts" :key="t.id">
      <div x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 transform translate-y-4"
        x-transition:enter-end="opacity-100 transform translate-y-0"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 transform translate-y-0"
        x-transition:leave-end="opacity-0 transform translate-y-4" :class="{
             'bg-green-600': t.type === 'success',
             'bg-red-600': t.type === 'error',
             'bg-blue-600': t.type === 'info'
           }" class="px-5 py-3 rounded-2xl shadow-2xl text-white font-black text-sm text-center pointer-events-auto"
        x-text="t.message">
      </div>
    </template>
  </div>

</body>

</html>
